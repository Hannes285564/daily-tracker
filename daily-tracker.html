<!DOCTYPE html>
<html data-theme="performance" lang="de" id="root">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root,[data-theme="aurora"]{--bg:#07030f;--surface:rgba(255,255,255,.06);--surface2:rgba(255,255,255,.04);--border:rgba(255,255,255,.1);--text:#f0eafa;--muted:rgba(255,255,255,.4);--primary:#a78bfa;--success:#4ade80;--danger:#f87171;--danger-bg:rgba(248,113,113,.1);--font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--radius:16px;--chart-grid:rgba(255,255,255,.06);}
[data-theme="apple"]{--bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--border:rgba(255,255,255,.08);--text:#fff;--muted:rgba(255,255,255,.45);--primary:#0a84ff;--success:#30d158;--danger:#ff453a;--danger-bg:rgba(255,69,58,.1);--font:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;--radius:12px;--chart-grid:rgba(255,255,255,.06);}
[data-theme="forest"]{--bg:#030c07;--surface:rgba(5,25,13,.6);--surface2:rgba(5,30,14,.7);--border:rgba(52,211,153,.13);--text:#e8f5e9;--muted:rgba(180,230,195,.42);--primary:#34d399;--success:#4ade80;--danger:#f87171;--danger-bg:rgba(248,113,113,.1);--font:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--radius:10px;--chart-grid:rgba(52,211,153,.07);}
[data-theme="performance"]{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:rgba(255,255,255,.08);--text:#f5f5f5;--muted:#6b7280;--primary:#5eead4;--success:#4ade80;--danger:#f87171;--danger-bg:rgba(248,113,113,.1);--font:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;--radius:16px;--chart-grid:rgba(255,255,255,.06);}
[data-theme="performance"] .wrap{background:#0a0a0a;}
[data-theme="performance"] .card{background:#141414;backdrop-filter:none;-webkit-backdrop-filter:none;box-shadow:0 1px 3px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);}
[data-theme="performance"] .topbar,[data-theme="performance"] .tabs{background:#0f0f0f;backdrop-filter:none;-webkit-backdrop-filter:none;border-bottom-color:rgba(255,255,255,.08);}
[data-theme="performance"] .tab-btn.active{color:#5eead4;background:rgba(94,234,212,.08);}
[data-theme="performance"] .btn-primary{background:#e8dcc8;color:#0a0a0a;font-weight:700;border-radius:12px;}
[data-theme="performance"] .btn-primary:hover{opacity:.9;}
[data-theme="performance"] .type-btn{border-radius:999px;}
[data-theme="performance"] .type-btn.active{background:#e8dcc8;color:#0a0a0a;border-color:#e8dcc8;font-weight:600;}
[data-theme="performance"] .form-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;}
[data-theme="performance"] .trk-btn-start{background:#e8dcc8;color:#0a0a0a;}
[data-theme="performance"] .plan-day-card{background:#141414;border-color:rgba(255,255,255,.08);}
[data-theme="performance"] .cal-tip{backdrop-filter:none;-webkit-backdrop-filter:none;background:#1c1c1c;}
[data-theme="performance"] .toast{backdrop-filter:none;-webkit-backdrop-filter:none;background:#1c1c1c;}
[data-theme="performance"] .day-modal-overlay{backdrop-filter:none;-webkit-backdrop-filter:none;}
[data-theme="performance"] .day-modal-panel{background:#141414;}
[data-theme="performance"] .big-cal-day{background:#141414;}
[data-theme="performance"] .trk-m{background:#141414;}
[data-theme="performance"] .wl-exercise{background:#141414;}
[data-theme="performance"] .tm-template-item{background:#141414;}
[data-theme="performance"] .tm-form{background:#141414;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg) center/cover fixed;color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.bg-aurora{display:none;position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
[data-theme="aurora"] .bg-aurora{display:block;}
.blob{position:absolute;border-radius:50%;filter:blur(90px);animation:bfloat 10s ease-in-out infinite;}
.b1{width:600px;height:400px;background:radial-gradient(ellipse,rgba(139,92,246,.18),transparent 70%);top:-120px;left:-100px;}
.b2{width:500px;height:500px;background:radial-gradient(ellipse,rgba(20,184,166,.13),transparent 70%);top:30%;right:-80px;animation-delay:-3.5s;}
.b3{width:380px;height:300px;background:radial-gradient(ellipse,rgba(232,121,249,.1),transparent 70%);bottom:-60px;left:35%;animation-delay:-7s;}
@keyframes bfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-24px)}}
.bg-forest{display:none;position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
[data-theme="forest"] .bg-forest{display:block;}
.fl1,.fl2,.fl3{position:absolute;border-radius:50%;filter:blur(110px);animation:ffloat 13s ease-in-out infinite;}
.fl1{width:550px;height:550px;background:radial-gradient(ellipse,rgba(6,78,59,.45),transparent 70%);top:-100px;right:-80px;}
.fl2{width:500px;height:420px;background:radial-gradient(ellipse,rgba(4,50,20,.7),transparent 70%);bottom:-80px;left:-60px;animation-delay:-5s;}
.fl3{width:380px;height:380px;background:radial-gradient(ellipse,rgba(45,212,191,.07),transparent 70%);top:45%;left:38%;animation-delay:-9s;}
@keyframes ffloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-22px) scale(1.025)}}
.wrap{position:relative;z-index:2;min-height:100vh;}
[data-theme="aurora"] .wrap{background:rgba(7,3,15,.88);}
[data-theme="forest"] .wrap{background:rgba(3,12,7,.92);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
.back-btn{color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:500;transition:color .2s;}
.back-btn:hover{color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.theme-sw{display:flex;gap:5px;align-items:center;margin-right:4px;}
.ts-btn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;transition:all .25s;}
.ts-btn span{display:block;width:100%;height:100%;border-radius:50%;}
.ts-btn.active{border-color:var(--text);transform:scale(1.18);}
.ts-btn:hover:not(.active){transform:scale(1.1);}
.lang-btn{padding:4px 11px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;}
.lang-btn.active{border-color:var(--primary);color:var(--primary);}
.bg-btn{padding:4px 11px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s;}
.bg-btn:hover{color:var(--text);}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;backdrop-filter:blur(12px);overflow-x:auto;gap:3px;}
.tab-btn{padding:7px 16px;border:none;background:none;cursor:pointer;font-size:.83rem;font-weight:500;color:var(--muted);border-bottom:none;border-radius:20px;transition:all .18s;font-family:var(--font);white-space:nowrap;}
.tab-btn.active{color:var(--primary);background:rgba(167,139,250,.13);}
.content{padding:32px;max-width:1200px;margin:0 auto;}
.tab-content{display:none;}.tab-content.active{display:block;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.card{background:rgba(255,255,255,.045);border-radius:var(--radius);padding:26px;border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(28px);box-shadow:0 8px 40px rgba(0,0,0,.32),0 1px 0 rgba(255,255,255,.09) inset;}
.card h2{font-size:1rem;font-weight:700;margin-bottom:18px;letter-spacing:.005em;}
.mb{margin-bottom:16px;}
input[type=text],input[type=date],input[type=number],input[type=time],select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;outline:none;transition:border-color .2s;background:var(--bg);color:var(--text);font-family:var(--font);}
input:focus,select:focus,textarea:focus{border-color:var(--primary);}
select option{background:var(--bg);color:var(--text);}
input[type=color]{width:44px;height:40px;padding:3px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--bg);flex-shrink:0;}
input[type=range]{width:100%;accent-color:var(--primary);cursor:pointer;}
.btn{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.875rem;font-weight:500;font-family:var(--font);transition:all .2s;}
.btn-primary{background:var(--primary);color:#0a0a0a;font-weight:700;}
[data-theme="aurora"] .btn-primary{color:#0f172a;}
.btn-primary:hover{opacity:.88;}
.btn-icon{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:5px;color:var(--muted);font-size:1rem;line-height:1;transition:all .2s;}
.btn-icon:hover{color:var(--danger);background:var(--danger-bg);}
.type-btns{display:flex;gap:8px;}
.type-btn{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:500;font-family:var(--font);transition:all .2s;}
.type-btn.active{border-color:var(--primary);color:var(--primary);}
.input-row{display:flex;gap:10px;margin-bottom:12px;align-items:center;}
.form-row{margin-bottom:12px;}
.form-label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:5px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.prog-wrap{margin-bottom:16px;}
.prog-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:6px;}
.prog-bg{background:var(--border);border-radius:999px;height:8px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:999px;}
.todo-item{display:flex;align-items:center;gap:12px;padding:12px 2px;border-radius:0;background:none;margin-bottom:0;border:none;border-bottom:1px solid rgba(255,255,255,.07);position:relative;transition:background .15s;}
.todo-item:hover{background:rgba(255,255,255,.03);border-radius:8px;}
.todo-item.done{opacity:.55;}
.todo-item.done .todo-name{text-decoration:line-through;}
.todo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.todo-name{font-size:.875rem;font-weight:500;}
.todo-cb{width:18px;height:18px;accent-color:var(--success);cursor:pointer;flex-shrink:0;}
.todo-item .del-btn{opacity:0;transition:opacity .15s;flex-shrink:0;}
.todo-item:hover .del-btn{opacity:1;}
.count-body{flex:1;min-width:0;}
.count-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.count-val{font-size:.8rem;color:var(--primary);font-weight:700;white-space:nowrap;min-width:36px;text-align:right;}
.count-max{font-size:.75rem;color:var(--muted);white-space:nowrap;}
.mini-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:5px;}
.mini-fill{height:100%;border-radius:2px;}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:.875rem;}
.empty .ico{font-size:2rem;margin-bottom:8px;}
.chart-wrap{position:relative;height:200px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.wday{text-align:center;}
.wday-label{font-size:.7rem;color:var(--muted);font-weight:600;margin-bottom:4px;}
.wday-bar{height:60px;background:var(--bg);border-radius:6px;overflow:hidden;display:flex;align-items:flex-end;position:relative;border:1px solid var(--border);}
.wday-fill{width:100%;background:linear-gradient(180deg,var(--primary),rgba(100,100,200,.6));border-radius:6px;transition:height .4s;}
.wday-pct{position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--muted);white-space:nowrap;}
.wday.today .wday-label{color:var(--success);font-weight:800;}
.wday.today .wday-fill{background:linear-gradient(180deg,var(--success),rgba(74,222,128,.5));}
.wday-date{font-size:.6rem;color:var(--muted);margin-top:3px;opacity:.6;}
.section-title{font-size:1.35rem;font-weight:800;margin:36px 0 16px;letter-spacing:-.015em;}
.cal-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.cal-header{font-size:.7rem;color:var(--muted);text-align:center;font-weight:600;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.7rem;}
.cal-day-num{font-weight:600;}
.cal-day-pct{font-size:.55rem;margin-top:1px;}
.cal-day.clickable{cursor:pointer;transition:filter .15s;}
.cal-day.clickable:hover{filter:brightness(1.5);}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);margin-top:2px;opacity:.8;}
.cal-tip{position:fixed;z-index:400;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;font-size:.76rem;min-width:158px;max-width:215px;pointer-events:none;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 10px 36px rgba(0,0,0,.6);opacity:0;transition:opacity .16s;line-height:1.45;}
.cal-tip.show{opacity:1;}
.cal-tip-date{font-weight:700;color:var(--primary);margin-bottom:7px;font-size:.79rem;border-bottom:1px solid var(--border);padding-bottom:6px;}
.cal-tip-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;color:var(--muted);}
.cal-tip-row b{color:var(--text);}
.cal-tip-div{margin-top:5px;border-top:1px solid var(--border);padding-top:5px;}
.legend{display:flex;gap:12px;margin-top:12px;font-size:.75rem;color:var(--muted);flex-wrap:wrap;}
.leg-dot{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:middle;margin-right:3px;}
.stat-card{background:none;border:none;border-radius:0;padding:16px 8px;text-align:center;}
.stat-num{font-size:2.4rem;font-weight:800;color:var(--primary);line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--muted);margin-top:6px;letter-spacing:.04em;text-transform:uppercase;}
.act-item{display:flex;align-items:center;gap:12px;padding:12px 2px;border-radius:0;background:none;margin-bottom:0;border:none;border-bottom:1px solid rgba(255,255,255,.07);}
.act-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;background:rgba(255,255,255,.06);}
.act-info{flex:1;}
.act-name{font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:8px;}
.act-meta{font-size:.75rem;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:.7rem;font-weight:600;}
.badge-low{background:rgba(74,222,128,.12);color:#4ade80;}
.badge-medium{background:rgba(251,191,36,.12);color:#fbbf24;}
.badge-high{background:rgba(248,113,113,.12);color:#f87171;}
/* health */
.calc-res{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:14px;}
.calc-target{font-size:2.2rem;font-weight:800;color:var(--primary);text-align:center;line-height:1.1;}
.calc-tsub{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:14px;}
.calc-row{display:flex;justify-content:space-around;margin-bottom:14px;}
.citem{text-align:center;}
.citem-n{font-size:1.05rem;font-weight:700;}
.citem-l{font-size:.68rem;color:var(--muted);margin-top:2px;}
.macro-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:8px 0 6px;gap:2px;}
.macro-bar div{border-radius:3px;}
.macro-leg{display:flex;gap:8px;font-size:.72rem;color:var(--muted);flex-wrap:wrap;justify-content:center;}
.macro-leg span{display:flex;align-items:center;gap:3px;}
.mdot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;}
.hlth-item{display:flex;align-items:flex-start;gap:10px;padding:11px 2px;border-radius:0;background:none;margin-bottom:0;border:none;border-bottom:1px solid rgba(255,255,255,.07);}
.hlth-date{font-size:.78rem;font-weight:700;color:var(--primary);min-width:72px;padding-top:1px;}
.hlth-vals{flex:1;display:flex;flex-wrap:wrap;gap:4px 12px;}
.hlth-val{font-size:.78rem;color:var(--muted);}
.hlth-val b{color:var(--text);font-weight:600;}
/* sync */
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;flex-shrink:0;vertical-align:middle;}
.sync-on{background:var(--success);box-shadow:0 0 7px var(--success);}
.sync-off{background:rgba(255,255,255,.18);}
.sync-status-row{display:flex;align-items:center;font-size:.82rem;margin-bottom:10px;color:var(--muted);}
.sync-readings{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:12px;min-height:1.5rem;}
.sync-prev-row{display:flex;justify-content:space-between;align-items:baseline;font-size:.78rem;padding:5px 0;border-bottom:1px solid var(--border);}
.sync-prev-date{color:var(--primary);font-weight:600;flex-shrink:0;margin-right:10px;}
.sync-prev-vals{color:var(--muted);text-align:right;}
.sync-prev-info{font-size:.8rem;font-weight:600;margin-bottom:8px;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:12px 20px;border-radius:8px;font-size:.875rem;z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5);backdrop-filter:blur(12px);}
.toast.show{transform:translateY(0);opacity:1;}
#bg-input{display:none;}
@media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.content{padding:14px;}}
@media(max-width:560px){.grid-4{grid-template-columns:1fr 1fr;}}
/* ── Plan tab ─────────────────────────────────────────────── */
.week-plan-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:16px;}
@media(max-width:900px){.week-plan-grid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:560px){.week-plan-grid{grid-template-columns:repeat(2,1fr);}}
.plan-day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:130px;display:flex;flex-direction:column;}
.plan-day-card.rest{opacity:.4;border-style:dashed;}
.plan-day-card.today-plan{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary);}
.plan-day-label{font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.plan-day-title{font-size:.82rem;font-weight:700;margin-bottom:5px;line-height:1.3;}
.plan-day-desc{font-size:.72rem;color:var(--muted);line-height:1.4;flex:1;}
.plan-day-meta{font-size:.7rem;margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;}
.plan-pill{padding:2px 7px;border-radius:6px;font-size:.65rem;font-weight:600;}
.plan-pill-low{background:rgba(74,222,128,.12);color:#4ade80;}
.plan-pill-medium{background:rgba(251,191,36,.12);color:#fbbf24;}
.plan-pill-high{background:rgba(248,113,113,.12);color:#f87171;}
.plan-item{display:flex;align-items:center;gap:10px;padding:11px 2px;border-radius:0;background:none;margin-bottom:0;border:none;border-bottom:1px solid rgba(255,255,255,.07);}
.plan-item.active-plan{border-color:var(--primary);}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-val{font-size:.82rem;font-weight:700;color:var(--primary);min-width:48px;}
/* ── Calendar tab ─────────────────────────────────────────── */
.big-cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;}
.big-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.big-cal-day{min-height:58px;border-radius:6px;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;transition:filter .15s;background:rgba(255,255,255,.04);}
.big-cal-day:hover{filter:brightness(1.5);}
.big-cal-day.empty-day{cursor:default;background:transparent;}
.big-cal-day.selected-cal{outline:2px solid var(--primary);outline-offset:1px;}

function getSportScienceKey(sportName){
  const n=sportName.toLowerCase();
  if(/ironman|triathlon/i.test(n))return'triathlon';
  if(/marathon/i.test(n))return'marathon';
  if(/lauf|run/i.test(n))return'laufen';
  if(/rad|cycl|bike/i.test(n))return'rad';
  if(/schwimm|swim/i.test(n))return'schwimmen';
  if(/kraft|strength|gym|weight/i.test(n))return'kraft';
  return'generic';
}
function getPlanTemplate(sportRaw,goalType,fitnessLevel){
  const name=sportRaw.replace(/^[\p{Emoji}\s]+/u,'').trim();
  const key=SPORT_KEY_MAP[name]||null;
  const tpl=key&&PLAN_TEMPLATES[key]?PLAN_TEMPLATES[key]:null;
  const lvl=fitnessLevel==='profi'?'fortgeschritten':fitnessLevel;
  if(tpl&&tpl[goalType]&&tpl[goalType][lvl])return tpl[goalType][lvl];
  if(tpl&&tpl[goalType]&&tpl[goalType]['fortgeschritten'])return tpl[goalType]['fortgeschritten'];
  if(tpl&&tpl[goalType]&&tpl[goalType]['anfaenger'])return tpl[goalType]['anfaenger'];
  return PLAN_FALLBACK;
}

function generatePlanWeeks(basePattern,durationWeeks,fitnessLevel,selectedDays,durMin,durMax){
  const sessions=basePattern.filter(d=>d!=null);
  const minTarget=durMin||45, maxTarget=durMax||durMin||45;
  const baseDurs=sessions.map(s=>s.duration);
  const baseMin=Math.min(...baseDurs),baseMax=Math.max(...baseDurs);
  const baseSpan=baseMax-baseMin||1;
  const targetSpan=maxTarget-minTarget;
  const weeks=[];
  for(let w=0;w<durationWeeks;w++){
    const blockIdx=Math.floor(w/4);
    const posInBlock=w%4;
    const isDeload=posInBlock===3&&w<durationWeeks-1;
    const mult=isDeload?0.75:(1+0.05*blockIdx)*(fitnessLevel==='profi'?1.1:1);
    const maxMult=fitnessLevel==='anfaenger'?1.25:fitnessLevel==='profi'?1.6:1.4;
    const finalMult=Math.min(mult,maxMult);
    const days=Array(7).fill(null);
    (selectedDays||[0,2,4]).forEach((dayIdx,si)=>{
      const session=sessions[si%sessions.length];
      if(session){
        const pos=(session.duration-baseMin)/baseSpan;
        const base=minTarget+pos*targetSpan;
        const scaled=Math.round(base*finalMult/5)*5;
        const lo=Math.round(minTarget*0.75/5)*5;
        const hi=Math.round(maxTarget*1.5/5)*5;
        days[dayIdx]={...session,duration:Math.max(lo,Math.min(scaled,hi))};
      }
    });
    weeks.push({weekNumber:w+1,days});
  }
  return weeks;
}

function generatePhasedPlanWeeks(phaseGroups,phaseSchedule,fitnessLevel,selectedDays){
  const weeks=[];
  let weekNum=0;
  const fallbackSessions=phaseGroups[Object.keys(phaseGroups)[0]]||[];
  for(const phase of phaseSchedule){
    const sessions=(phaseGroups[phase.name]||fallbackSessions).filter(d=>d!=null);
    if(!sessions.length)continue;
    for(let w=0;w<phase.weeks;w++){
      weekNum++;
      const posInBlock=w%4;
      const isDeload=posInBlock===3&&w<phase.weeks-1;
      const blockIdx=Math.floor(w/4);
      const mult=isDeload?0.65:(1+0.05*blockIdx)*(fitnessLevel==='profi'?1.1:1);
      const maxMult=fitnessLevel==='anfaenger'?1.2:fitnessLevel==='profi'?1.5:1.35;
      const finalMult=Math.min(mult,maxMult);
      const days=Array(7).fill(null);
      (selectedDays||[0,2,4]).forEach((dayIdx,si)=>{
        const session=sessions[si%sessions.length];
        if(session){
          days[dayIdx]={...session,duration:Math.round(session.duration*finalMult/5)*5};
        }
      });
      weeks.push({weekNumber:weekNum,phase:phase.name,days});
    }
  }
  return weeks;
}

function parsePlanDuration(){
  const raw=(document.getElementById('plan-dur-input').value||'').trim();
  const m=raw.match(/(\d+)\s*(?:bis|to|-|–)\s*(\d+)/i);
  if(m){const lo=Math.min(+m[1],+m[2]),hi=Math.max(+m[1],+m[2]);planSessionDuration=Math.max(15,Math.min(300,lo));planDurMax=Math.max(planSessionDuration,Math.min(300,hi));}
  else{const n=parseInt(raw);if(!isNaN(n)){planSessionDuration=planDurMax=Math.max(15,Math.min(300,n));}}
  [30,45,60,90].forEach(v=>{const b=document.getElementById('plan-dur-'+v);if(b)b.classList.remove('active');});
}
function _parseMinuteRange(raw){
  if(!raw)return{min:60,max:60};
  const m=String(raw).match(/(\d+)\s*(?:bis|to|-|–)\s*(\d+)/i);
  if(m){const lo=parseInt(m[1],10),hi=parseInt(m[2],10),mn=Math.min(lo,hi),mx=Math.max(lo,hi);return{min:mn,max:2*mx-mn};}
  const n=parseInt(raw,10);const v=isNaN(n)?60:Math.min(300,Math.max(15,n));return{min:v,max:v};
}

  const basePattern=getPlanTemplate(sportRaw,goalType,planFitLevel);

function closeCustomPlanBuilder(){
  document.getElementById('custom-plan-overlay').classList.remove('open');
  customPlanState=null;
}

function cpbResizeWeeks(n){
  if(!customPlanState)return;
  n=Math.min(52,Math.max(1,n||1));
  while(customPlanState.weeks.length<n)customPlanState.weeks.push({days:Array(7).fill(null)});
  customPlanState.weeks=customPlanState.weeks.slice(0,n);
  customPlanState.numWeeks=n;
  if(customPlanState.currentWeek>=n)customPlanState.currentWeek=n-1;
  renderCustomBuilder();
}

function cpbPrevWeek(){
  if(!customPlanState||customPlanState.currentWeek<=0)return;
  customPlanState.currentWeek--;
  renderCustomBuilder();
}

function cpbNextWeek(){
  if(!customPlanState||customPlanState.currentWeek>=customPlanState.numWeeks-1)return;
  customPlanState.currentWeek++;
  renderCustomBuilder();
}

function cpbCopyFromPrev(){
  if(!customPlanState||customPlanState.currentWeek===0)return;
  const prev=customPlanState.weeks[customPlanState.currentWeek-1];
  customPlanState.weeks[customPlanState.currentWeek]={days:prev.days.map(d=>d?{...d}:null)};
  renderCustomBuilder();
}

function renderCustomBuilder(){
  if(!customPlanState)return;

  const n=customPlanState.numWeeks;

  document.getElementById('cpb-week-label').textContent=(de?'Woche ':'Week ')+(w+1)+' / '+n;

  document.getElementById('cpb-next-btn').disabled=w>=n-1;
  document.getElementById('cpb-copy-btn').style.display=w===0?'none':'';

      <textarea class="cpb-field" rows="2" placeholder="${de?'Beschreibung / Details':'Description / details'}" oninput="cpbUpdateSession(${d},'description',this.value)">${esc(s.description||'')}</textarea>

function cpbAddSession(d){
  if(!customPlanState)return;

function cpbRemoveSession(d){

function cpbUpdateSession(d,field,value){
  if(!customPlanState)return;

function saveCustomPlan(){
  if(!customPlanState)return;
  const name=(document.getElementById('cpb-name').value||'').trim()||(lang==='de'?'Eigener Plan':'Custom Plan');
  const startDate=document.getElementById('cpb-start').value||todayStr();

function getActivePlan(){return planData.plans.find(p=>p.id===planData.activePlanId)||null;}
function getActivePlanCurrentWeek(){
  const plan=getActivePlan();if(!plan)return 0;
  const start=new Date(plan.startDate+'T00:00:00');
  const dow=(start.getDay()+6)%7;
  const monday=new Date(start);monday.setDate(start.getDate()-dow);
  const now=new Date();
  const diffDays=Math.floor((now-monday)/86400000);
  return Math.max(0,Math.min(Math.floor(diffDays/7),plan.weeks.length-1));
}
function getPlanWorkoutForDate(dateStr){
  const plan=getActivePlan();if(!plan)return null;
  const start=new Date(plan.startDate+'T00:00:00');
  const dow=(start.getDay()+6)%7;
  const monday=new Date(start);monday.setDate(start.getDate()-dow);
  const d=new Date(dateStr+'T00:00:00');
  const diffDays=Math.floor((d-monday)/86400000);
  if(diffDays<0||diffDays>=plan.weeks.length*7)return null;
  const weekIdx=Math.floor(diffDays/7);
  const dayIdx=diffDays%7;
  return plan.weeks[weekIdx]?.days[dayIdx]||null;
}

// ── GPS Activity Tracker ───────────────────────────────────
const TRACK_SPORTS=[
  {key:'laufen',    emoji:'🏃', metrics:['duration','distance','pace','steps','calories','elevation']},
  {key:'rad',       emoji:'🚴', metrics:['duration','distance','speed','maxspeed','calories']},
  {key:'wandern',   emoji:'🥾', metrics:['duration','distance','speed','steps','elevation','calories']},
  {key:'triathlon', emoji:'🏅', metrics:['duration','distance','speed','steps','calories','elevation']},
  {key:'schwimmen', emoji:'🏊', metrics:['duration','laps','caldist','calories']},
  {key:'hiit',      emoji:'🔥', metrics:['duration','steps','calories']},
  {key:'kraft',     emoji:'💪', metrics:['duration','calories']},
];
const TRACK_SPORT_NAMES={de:{laufen:'Laufen',rad:'Radfahren',wandern:'Wandern',triathlon:'Triathlon',schwimmen:'Schwimmen',hiit:'HIIT',kraft:'Krafttraining'},en:{laufen:'Running',rad:'Cycling',wandern:'Hiking',triathlon:'Triathlon',schwimmen:'Swimming',hiit:'HIIT',kraft:'Strength'}};
const TRACK_MET={laufen:9.8,rad:7.5,wandern:5.3,triathlon:9,schwimmen:8,hiit:10,kraft:4};
const METRIC_LABELS={duration:{de:'Dauer',en:'Duration'},distance:{de:'Distanz',en:'Distance'},pace:{de:'Tempo',en:'Pace'},speed:{de:'Ø Speed',en:'Avg Speed'},maxspeed:{de:'Max Speed',en:'Max Speed'},steps:{de:'Schritte',en:'Steps'},calories:{de:'Kalorien',en:'Calories'},elevation:{de:'Höhenmeter',en:'Elevation'},laps:{de:'Bahnen',en:'Laps'},caldist:{de:'Distanz (m)',en:'Distance (m)'}};

let trackSport=TRACK_SPORTS[0],trackActive=false,trackStartTime=null,trackElapsed=0;
let trackTimerInterval=null,gpsWatchId=null,wakeLock=null;
let trackPoints=[],trackSteps=0,trackLaps=0,trackMaxSpeedKmh=0,trackLapMeters=25;

function selectTrackSport(key){trackSport=TRACK_SPORTS.find(s=>s.key===key)||TRACK_SPORTS[0];renderTrackTab();}

function haversineKm(la1,lo1,la2,lo2){const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180,a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function calcTrackDistance(){let d=0;for(let i=1;i<trackPoints.length;i++){const p=trackPoints[i],q=trackPoints[i-1];if(p.acc<40&&q.acc<40)d+=haversineKm(q.lat,q.lng,p.lat,p.lng);}return d;}

function calcElevGain(){let g=0;for(let i=1;i<trackPoints.length;i++){const d=(trackPoints[i].alt||0)-(trackPoints[i-1].alt||0);if(d>0.5)g+=d;}return Math.round(g);}

function calcCals(durMin,distKm){return Math.round((TRACK_MET[trackSport.key]||6)*75*(durMin/60));}

function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}

function fmtPace(distKm,sec){if(distKm<0.01)return'--:--';const spk=sec/distKm,m=Math.floor(spk/60),s=Math.round(spk%60);return`${m}:${String(s).padStart(2,'0')}`;}

let _stepBuf=[],_lastStepTs=0;
function _onMotion(e){const a=e.accelerationIncludingGravity;if(!a)return;const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);_stepBuf.push(mag);if(_stepBuf.length>10)_stepBuf.shift();const avg=_stepBuf.reduce((s,v)=>s+v,0)/_stepBuf.length;const now=Date.now();if(mag>avg+2.8&&now-_lastStepTs>280){trackSteps++;_lastStepTs=now;_updateTrackMetrics();}}

async function startTracking(){
  if(trackActive)return;
  trackActive=true;trackStartTime=Date.now();trackPoints=[];trackSteps=0;trackLaps=0;trackMaxSpeedKmh=0;trackElapsed=0;_stepBuf=[];
  try{wakeLock=await navigator.wakeLock?.request('screen');}catch(e){}
  const needsGPS=['laufen','rad','wandern'].includes(trackSport.key);
  if(needsGPS&&navigator.geolocation){
    gpsWatchId=navigator.geolocation.watchPosition(pos=>{
      const p={lat:pos.coords.latitude,lng:pos.coords.longitude,alt:pos.coords.altitude||0,ts:Date.now(),spd:(pos.coords.speed||0)*3.6,acc:pos.coords.accuracy};
      trackPoints.push(p);
      if(p.spd>trackMaxSpeedKmh)trackMaxSpeedKmh=p.spd;
      _updateTrackMetrics();
    },err=>{_setGpsStatus('err',err.message);},{enableHighAccuracy:true,maximumAge:2000,timeout:15000});
  }
  const needsMotion=['laufen','wandern','hiit'].includes(trackSport.key);
  if(needsMotion&&window.DeviceMotionEvent){
    if(typeof DeviceMotionEvent.requestPermission==='function'){try{await DeviceMotionEvent.requestPermission();}catch(e){}}
    window.addEventListener('devicemotion',_onMotion);
  }
  trackTimerInterval=setInterval(()=>{trackElapsed=Math.round((Date.now()-trackStartTime)/1000);_updateTrackMetrics();},1000);
  renderTrackTab();
}

function stopTracking(){
  if(!trackActive)return;
  trackActive=false;
  clearInterval(trackTimerInterval);trackTimerInterval=null;
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  window.removeEventListener('devicemotion',_onMotion);
  wakeLock?.release();wakeLock=null;
  renderTrackTab();
}

function addTrackLap(){trackLaps++;_updateTrackMetrics();}

function _setGpsStatus(cls,msg){const el=document.getElementById('trk-gps');if(el)el.innerHTML=`<div class="trk-dot ${cls}"></div><span>${msg}</span>`;}

function _getMetricValues(){
  const dist=calcTrackDistance(),durMin=trackElapsed/60,spd=dist>0&&trackElapsed>0?dist/(trackElapsed/3600):0;
  return{
    duration:`<span style="font-size:1.4rem">${fmtDur(trackElapsed)}</span>`,
    distance:`${dist.toFixed(2)}<small style="font-size:.9rem"> km</small>`,
    pace:`${fmtPace(dist,trackElapsed)}<small style="font-size:.75rem"> /km</small>`,
    speed:`${spd.toFixed(1)}<small style="font-size:.9rem"> km/h</small>`,
    maxspeed:`${trackMaxSpeedKmh.toFixed(1)}<small style="font-size:.9rem"> km/h</small>`,
    steps:trackSteps.toLocaleString(),
    calories:`${calcCals(durMin,dist)}<small style="font-size:.85rem"> kcal</small>`,
    elevation:`+${calcElevGain()}<small style="font-size:.85rem"> m</small>`,
    laps:`${trackLaps}`,
    caldist:`${trackLaps*trackLapMeters}<small style="font-size:.85rem"> m</small>`,
  };
}

function _updateTrackMetrics(){
  const grid=document.getElementById('trk-metrics');if(!grid)return;
  const v=_getMetricValues();
  grid.innerHTML=trackSport.metrics.map(k=>`<div class="trk-m"><div class="trk-m-val">${v[k]||'—'}</div><div class="trk-m-lbl">${METRIC_LABELS[k]?.[lang]||k}</div></div>`).join('');
  const gpsEl=document.getElementById('trk-gps');
  if(gpsEl&&['laufen','rad','wandern'].includes(trackSport.key)){
    const n=trackPoints.length,last=trackPoints[n-1];
    const acc=last?Math.round(last.acc):null;
    const cls=n===0?'wait':acc<15?'ok':acc<35?'wait':'err';
    const txt=n===0?(lang==='de'?'GPS wird gesucht…':'Searching GPS…'):(lang==='de'?`GPS aktiv · ±${acc}m · ${n} Pkt.`:`GPS active · ±${acc}m · ${n} pts`);
    gpsEl.innerHTML=`<div class="trk-dot ${cls}"></div><span>${txt}</span>`;
  }
}

function saveTrackSession(){
  const dist=calcTrackDistance(),durMin=Math.max(1,Math.round(trackElapsed/60));
  const cals=calcCals(durMin,dist);
  const sportName=TRACK_SPORT_NAMES[lang][trackSport.key];
  const swimDist=trackLaps*trackLapMeters;
  const notesParts=[durMin+' min'];
  if(dist>0.01)notesParts.push(dist.toFixed(2)+' km');
  if(swimDist>0)notesParts.push(swimDist+' m');
  if(trackSteps>0)notesParts.push(trackSteps+(lang==='de'?' Schritte':' steps'));
  if(calcElevGain()>0)notesParts.push('+'+calcElevGain()+' m');
  if(cals>0)notesParts.push('~'+cals+' kcal');
  const intensity=trackElapsed>3600?'low':durMin>40?'medium':'high';
  data.activities.push({id:uid(),type:sportName,emoji:trackSport.emoji,date:todayStr(),duration:durMin,intensity,notes:(lang==='de'?'📡 Aufgezeichnet: ':'📡 Recorded: ')+notesParts.join(', '),calories:cals});
  save();toast(lang==='de'?'Als Aktivität gespeichert ✓':'Saved as activity ✓');
  document.getElementById('trk-save-btn')?.remove();
}

function cleanupExpiredTodos(){
  const today=todayStr();
  const now=new Date();const dow=(now.getDay()+6)%7;
  const mon=new Date(now);mon.setDate(now.getDate()-dow);
  const mondayStr=mon.toISOString().split('T')[0];
  let changed=false;
  data.todos=data.todos.filter(td=>{
    if(!td.frequency||td.frequency==='regular')return true;
    if(td.frequency==='daily'&&td.createdDate&&td.createdDate<today){changed=true;return false;}
    if(td.frequency==='weekly'&&td.createdDate&&td.createdDate<mondayStr){changed=true;return false;}
    return true;
  });
  if(changed)save();
}

function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateRange(n){return Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;});}
function getVal(ds,id){return(data.completions[ds]||{})[id]||0;}
function setVal(ds,id,v){if(!data.completions[ds])data.completions[ds]={};if(!v)delete data.completions[ds][id];else data.completions[ds][id]=v;}
function ratio(ds,td){const v=getVal(ds,td.id);return td.type==='count'?Math.min(v/(td.target||1),1):(v?1:0);}
function pct(ds){const a=data.todos.filter(x=>x.active);if(!a.length)return 0;return Math.round(a.reduce((s,x)=>s+ratio(ds,x),0)/a.length*100);}
function uid(){return Math.random().toString(36).slice(2,11);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}

function _todoItemHtml(td,day){const val=getVal(day,td.id);const timeBadge=td.linkedStartTime?`<span class="todo-time-badge">📅 ${td.linkedStartTime}${td.linkedDuration?' · '+minToHM(td.linkedDuration):''}</span>`:'';if(td.type==='count'){const done=val>=td.target,fill=Math.min(Math.round(val/td.target*100),100);return`<div class="todo-item${done?' done':''}" id="item-${td.id}" style="align-items:flex-start"><div class="todo-dot" style="background:${td.color};margin-top:3px;flex-shrink:0"></div><div class="count-body"><div class="todo-name">${esc(td.name)}${timeBadge}</div><div class="count-row"><input type="range" min="0" max="${td.target}" value="${val}" oninput="sliderInput('${td.id}',this.value)" onchange="sliderChange('${td.id}',this.value)"><span class="count-val" id="cv-${td.id}">${val}</span><span class="count-max">/ ${td.target}</span></div><div class="mini-bar"><div class="mini-fill" id="cf-${td.id}" style="width:${fill}%;background:${td.color}"></div></div></div><button class="btn-icon del-btn" onclick="deleteTodo('${td.id}')">🗑️</button></div>`;}const done=val===1;return`<div class="todo-item${done?' done':''}"><div class="todo-dot" style="background:${td.color}"></div><input class="todo-cb" type="checkbox"${done?' checked':''} onchange="toggleBool('${td.id}')"><span class="todo-name">${esc(td.name)}</span>${timeBadge}<button class="btn-icon del-btn" onclick="deleteTodo('${td.id}')">🗑️</button></div>`;}

function calcActivityKcal(intensity,duration){
  const w=(healthData.entries.filter(e=>e.weight!=null).sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0]?.weight)||75;
  const met={low:4,medium:7,high:11};
  return Math.round((met[intensity]||7)*w*(duration/60));
}

function renderSportStats(){const acts=data.activities,tm=acts.reduce((s,a)=>s+a.duration,0);const wds=dateRange(7),wm=acts.filter(a=>wds.includes(a.date)).reduce((s,a)=>s+a.duration,0);const counts={};acts.forEach(a=>counts[a.type]=(counts[a.type]||0)+1);const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];document.getElementById('sport-stats').innerHTML=`<div class="stat-card"><div class="stat-num">${(tm/60).toFixed(1)}</div><div class="stat-lbl">${t('sTotal')}</div></div><div class="stat-card"><div class="stat-num">${(wm/60).toFixed(1)}</div><div class="stat-lbl">${t('sWeek')}</div></div><div class="stat-card"><div class="stat-num">${top?(acts.find(a=>a.type===top[0])?.emoji||'💪'):'—'}</div><div class="stat-lbl">${top?esc(top[0]):t('sNone')}</div></div>`;}
function renderActivities(){const el=document.getElementById('activities-list');const sorted=[...data.activities].sort((a,b)=>b.date.localeCompare(a.date));if(!sorted.length){el.innerHTML=`<div class="empty"><div class="ico">🏃</div>${t('eA')}</div>`;return;}const iL={low:t('iLS'),medium:t('iMS'),high:t('iHS')},iC={low:'badge-low',medium:'badge-medium',high:'badge-high'};el.innerHTML=sorted.map(a=>{const h=Math.floor(a.duration/60),mn=a.duration%60,dur=h>0?`${h}h ${mn}min`:`${mn}min`;const tplBadge=a.templateName?` <span style="font-size:.68rem;color:var(--muted)">· ${esc(a.templateName)}</span>`:'';const exSummary=a.exercises?.length?`<div class="act-exercises">${a.exercises.map(e=>`<span class="tm-ex-tag">${esc(e.name)}</span>`).join('')}</div>`:'';return`<div class="act-item"><div class="act-icon">${esc(a.emoji)}</div><div class="act-info"><div class="act-name">${esc(a.type)} <span class="badge ${iC[a.intensity]}">${iL[a.intensity]}</span>${tplBadge}</div><div class="act-meta">${fmtDate(a.date)} · ${dur}${a.calories?' · ~'+a.calories+' kcal':''}${a.notes?' · '+esc(a.notes):''}</div>${exSummary}</div><button class="btn-icon" onclick="editActivity('${a.id}')" title="${lang==='de'?'Bearbeiten':'Edit'}">✏️</button><button class="btn-icon" onclick="deleteActivity('${a.id}')">🗑️</button></div>`;}).join('');}

// ── Workout Logger & Templates ────────────────────────────
const WORKOUT_TEMPLATES_KEY='daily-tracker-workout-templates';
function defWTData(){return{templates:[]};}
function loadWorkoutTemplates(){try{return JSON.parse(localStorage.getItem(WORKOUT_TEMPLATES_KEY))||defWTData();}catch{return defWTData();}}
function saveWorkoutTemplates(){localStorage.setItem(WORKOUT_TEMPLATES_KEY,JSON.stringify(wtData));}
let wtData=loadWorkoutTemplates();
let editingTemplateId=null,tmExCount=0;

function getSportTemplateCat(raw){
  const v=(raw||'').toLowerCase();
  if(v.includes('lauf')||v.includes('run')||v.includes('jogg'))return 'running';
  if(v.includes('rad')||v.includes('cycl')||v.includes('bike')||v.includes('fahren'))return 'cycling';
  if(v.includes('wander')||v.includes('hik'))return 'hiking';
  if(v.includes('kraft')||v.includes('strength')||v.includes('gym')||v.includes('weight'))return 'strength';
  return null;
}

function onSportTypeChange(){
  const raw=document.getElementById('sport-type')?.value||'';
  const custom=(document.getElementById('sport-custom')?.value||'').trim();
  const cat=getSportTemplateCat(custom||raw);
  const sec=document.getElementById('workout-logger-section');
  if(!sec)return;
  const hasTpls=cat!=null&&wtData.templates.some(tp=>(tp.category||'other')===cat);
  sec.style.display=hasTpls?'':'none';
  if(hasTpls)renderWorkoutLogger(cat);
}

function getLastWorkoutForTemplate(templateId){
  return[...data.activities].filter(a=>a.templateId===templateId&&a.exercises?.length).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
}

function getProgressionSuggestion(exerciseId,templateId,targetReps,defaultWeight){
  const last=getLastWorkoutForTemplate(templateId);
  if(!last)return{suggestedWeight:defaultWeight||0,suggestedReps:targetReps,lastSets:null,completed:false};
  const lastEx=last.exercises.find(e=>e.exerciseId===exerciseId);
  if(!lastEx?.sets?.length)return{suggestedWeight:defaultWeight||0,suggestedReps:targetReps,lastSets:null,completed:false};
  const lastSets=lastEx.sets;
  const lastWeight=lastSets[0]?.weight||0;
  const allDone=lastSets.every(s=>s.reps>=targetReps);
  const isBodyweight=lastWeight===0&&(defaultWeight||0)===0;
  return{suggestedWeight:allDone&&!isBodyweight?lastWeight+2.5:lastWeight,suggestedReps:allDone&&isBodyweight?targetReps+1:targetReps,lastSets,completed:allDone};
}

function renderWorkoutLogger(filterCat){
  const container=document.getElementById('wl-exercises-container');
  const sel=document.getElementById('wl-template-select');
  if(!container||!sel)return;
  const prevId=sel.value;
  const filtered=filterCat!=null?wtData.templates.filter(tp=>(tp.category||'other')===filterCat):wtData.templates;
  sel.innerHTML=`<option value="">${t('wlNoTpl')}</option>`+filtered.map(tp=>`<option value="${tp.id}">${esc(tp.name)}</option>`).join('');
  if(prevId&&filtered.find(tp=>tp.id===prevId))sel.value=prevId;
  const templateId=sel.value;
  if(!templateId){container.innerHTML=`<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:10px 0;opacity:.7">${lang==='de'?'Vorlage wählen oder unten eine neue erstellen.':'Select a template or create one below.'}</div>`;return;}
  const template=wtData.templates.find(tp=>tp.id===templateId);
  if(!template){container.innerHTML='';return;}
  container.innerHTML=template.exercises.map((ex,exIdx)=>{
    const prog=getProgressionSuggestion(ex.id,templateId,ex.reps,ex.weight);
    const lastParts=prog.lastSets?prog.lastSets.map(s=>ex.weight>0||s.weight>0?`${s.weight}kg×${s.reps}`:s.reps+'×').join('/'):'';
    const progBadge=prog.completed?`<span class="wl-progression-badge">↑ ${ex.weight>0||prog.suggestedWeight>0?prog.suggestedWeight+'kg':'+1 '+t('wlReps')}</span>`:'';
    const lastInfo=prog.lastSets?`<div class="wl-last-info">${t('wlLastTime')}: ${lastParts}${progBadge}</div>`:`<div class="wl-last-info" style="opacity:.5">${lang==='de'?'Erster Eintrag — starte jetzt!':'First entry — start now!'}</div>`;
    const setsHtml=Array.from({length:ex.sets},(_,si)=>`<div class="wl-set-row"><span class="wl-set-num">${si+1}</span><input type="number" class="input wl-set-input" id="wl-w-${exIdx}-${si}" value="${prog.suggestedWeight||''}" min="0" step="0.5" placeholder="kg"><span class="wl-set-x">×</span><input type="number" class="input wl-set-input" id="wl-r-${exIdx}-${si}" value="${prog.suggestedReps||''}" min="0" placeholder="${t('wlReps')}"></div>`).join('');
    return`<div class="wl-exercise" data-ex-id="${ex.id}" data-ex-idx="${exIdx}"><div class="wl-ex-header"><span class="wl-ex-name">${esc(ex.name)}</span><span style="font-size:.72rem;color:var(--muted)">${ex.sets}×${ex.reps}${ex.weight>0?' · '+ex.weight+'kg':''}</span></div>${lastInfo}<div class="wl-sets" id="wl-sets-${exIdx}">${setsHtml}</div><button class="wl-add-set-btn" onclick="addSetRow(${exIdx})">${t('wlAddSet')}</button></div>`;
  }).join('');
}

function addSetRow(exIdx){
  const setsContainer=document.getElementById(`wl-sets-${exIdx}`);if(!setsContainer)return;
  const si=setsContainer.querySelectorAll('.wl-set-row').length;
  const lastW=document.getElementById(`wl-w-${exIdx}-${si-1}`)?.value||'';
  const lastR=document.getElementById(`wl-r-${exIdx}-${si-1}`)?.value||'';
  const row=document.createElement('div');row.className='wl-set-row';
  row.innerHTML=`<span class="wl-set-num">${si+1}</span><input type="number" class="input wl-set-input" id="wl-w-${exIdx}-${si}" value="${lastW}" min="0" step="0.5" placeholder="kg"><span class="wl-set-x">×</span><input type="number" class="input wl-set-input" id="wl-r-${exIdx}-${si}" value="${lastR}" min="0" placeholder="${t('wlReps')}">`;
  setsContainer.appendChild(row);
}

function readWorkoutLoggerExercises(){
  const sel=document.getElementById('wl-template-select');
  const templateId=sel?.value||null;
  if(!templateId)return{templateId:null,templateName:null,exercises:[]};
  const template=wtData.templates.find(tp=>tp.id===templateId);
  const exercises=[];
  document.querySelectorAll('.wl-exercise').forEach(exEl=>{
    const exIdx=parseInt(exEl.dataset.exIdx);
    const exerciseId=exEl.dataset.exId;
    const exDef=template?.exercises.find(e=>e.id===exerciseId);
    const name=exDef?.name||'';
    const sets=[];
    let si=0;
    while(true){
      const wEl=document.getElementById(`wl-w-${exIdx}-${si}`);
      const rEl=document.getElementById(`wl-r-${exIdx}-${si}`);
      if(!wEl||!rEl)break;
      const r=parseInt(rEl.value)||0;
      if(r>0)sets.push({weight:parseFloat(wEl.value)||0,reps:r});
      si++;
    }
    if(sets.length)exercises.push({exerciseId,name,sets});
  });
  return{templateId,templateName:template?.name||null,exercises};
}

function renderTemplateManager(){
  const list=document.getElementById('tm-list');if(!list)return;
  if(!wtData.templates.length){
    list.innerHTML=`<div class="empty" style="padding:12px 0"><div class="ico">🏋️</div><div>${t('tmNoTpl')}</div></div>`;
  }else{
    list.innerHTML=wtData.templates.map(tp=>{
      const exTags=tp.exercises.slice(0,4).map(e=>`<span class="tm-ex-tag">${esc(e.name)}</span>`).join('');
      const more=tp.exercises.length>4?`<span class="tm-ex-tag">+${tp.exercises.length-4}</span>`:'';
      const catLabel=t('tmCat_'+(tp.category||'other'));
      return`<div class="tm-template-item"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.88rem;margin-bottom:4px">${esc(tp.name)}<span class="badge" style="font-size:.62rem;margin-left:6px;opacity:.8">${catLabel}</span></div><div style="line-height:1.8">${exTags}${more}</div></div><button class="btn-icon" onclick="openEditTemplateForm('${tp.id}')" title="${t('tmEditBtn')}">✏️</button><button class="btn-icon" onclick="deleteWorkoutTemplate('${tp.id}')">🗑️</button></div>`;
    }).join('');
  }
}

function tmExRow(idx,name,sets,reps,weight,existingId){

function addTmExRow(){

// ── Calendar tooltip ──────────────────────────────────────
let tipTO=null;
function showCalTip(e,tab,ds){
  clearTimeout(tipTO);
  const html=buildTipContent(tab,ds);
  if(!html)return;
  const tip=document.getElementById('cal-tip');
  tip.innerHTML=html;
  const rect=e.currentTarget.getBoundingClientRect();
  const tw=190,th=150;
  let left=rect.left+rect.width/2-tw/2,top=rect.top-th-10;
  if(top<60)top=rect.bottom+10;
  left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
  tip.style.left=left+'px';tip.style.top=top+'px';
  tip.classList.add('show');
}
function hideCalTip(){tipTO=setTimeout(()=>document.getElementById('cal-tip').classList.remove('show'),80);}
function buildTipContent(tab,ds){
  const dt=new Date(ds+'T00:00:00');
  const dlbl=`${t('calD')[(dt.getDay()+6)%7]}, ${dt.getDate()}.${dt.getMonth()+1}.${dt.getFullYear()}`;
  let rows='';
  if(tab==='todos'){
    const _dtT=new Date(ds+'T00:00:00'),_dowT=(_dtT.getDay()+6)%7,_monT=new Date(_dtT);_monT.setDate(_dtT.getDate()-_dowT);const _monStrT=_monT.toISOString().split('T')[0];
    const active=data.todos.filter(x=>{if(!x.active)return false;if(!x.frequency||x.frequency==='regular')return true;if(x.frequency==='daily')return x.createdDate===ds;if(x.frequency==='weekly')return x.createdDate&&x.createdDate>=_monStrT;return true;});if(!active.length)return'';
    const dn=active.filter(x=>x.type==='count'?getVal(ds,x.id)>=x.target:getVal(ds,x.id)===1).length;
    const dpct=Math.round(active.reduce((s,x)=>s+ratio(ds,x),0)/active.length*100);
    rows+=`<div class="cal-tip-row">📋 <b>${dn}/${active.length}</b> (${dpct}%)</div>`;
    active.slice(0,7).forEach(td=>{
      const done=td.type==='count'?getVal(ds,td.id)>=td.target:getVal(ds,td.id)===1;
      rows+=`<div class="cal-tip-row"><span style="color:${td.color};font-size:.65rem">●</span><span style="flex:1;${done?'':'opacity:.4'}">${esc(td.name)}</span><span style="font-size:.8rem">${done?'✓':'–'}</span></div>`;
    });
    if(active.length>7)rows+=`<div class="cal-tip-row" style="opacity:.4">+${active.length-7}…</div>`;
  }else if(tab==='sport'){
    const acts=data.activities.filter(a=>a.date===ds);if(!acts.length)return'';
    acts.slice(0,5).forEach(a=>{rows+=`<div class="cal-tip-row">${esc(a.emoji)} <b style="flex:1">${esc(a.type)}</b><span style="margin-left:auto">${a.duration} min</span></div>`;});
    if(acts.length>5)rows+=`<div class="cal-tip-row" style="opacity:.4">+${acts.length-5}…</div>`;
    const tot=acts.reduce((s,a)=>s+a.duration,0);
    rows+=`<div class="cal-tip-row cal-tip-div">∑ <b>${tot} min</b>${acts.length>1?` (${acts.length} ${lang==='de'?'Einträge':'entries'})`:''}</div>`;
  }else if(tab==='health'){
    const en=[...healthData.entries].filter(e=>e.date===ds);if(!en.length)return'';
    const e=en[en.length-1];
    if(e.weight!=null)rows+=`<div class="cal-tip-row">⚖️ <b>${e.weight} kg</b></div>`;
    if(e.hr!=null)rows+=`<div class="cal-tip-row">❤️ <b>${e.hr} bpm</b></div>`;
    if(e.sleepH!=null)rows+=`<div class="cal-tip-row">😴 <b>${e.sleepH}h</b>${e.sleepScore?` · ${e.sleepScore}/10`:''}</div>`;
    if(e.kcal!=null)rows+=`<div class="cal-tip-row">🔥 <b>${e.kcal} kcal</b></div>`;
    if(e.recovery!=null)rows+=`<div class="cal-tip-row">💪 <b>${e.recovery}/10</b> ${lang==='de'?'Erholung':'Recovery'}</div>`;
    const macros=[e.protein!=null?`P ${e.protein}g`:'',e.carbs!=null?`KH ${e.carbs}g`:'',e.fat!=null?`F ${e.fat}g`:''].filter(Boolean);
    if(macros.length)rows+=`<div class="cal-tip-row" style="opacity:.6;font-size:.7rem">${macros.join(' · ')}</div>`;
    if(en.length>1)rows+=`<div class="cal-tip-row" style="opacity:.4">${en.length} ${lang==='de'?'Einträge':'entries'}</div>`;
  }else if(tab==='dayplan'){
    const wake=timeToMin(dayPlan.wakeTime||'07:00'),sleep=timeToMin(dayPlan.sleepTime||'22:30');
    const avail=sleep>wake?sleep-wake:1440-(wake-sleep);
    const realB=(dayPlan.byDate&&dayPlan.byDate[ds])||[];
    const todoB=getTodoBlocks(ds);
    const allB=[...realB,...todoB].sort((a,b)=>a.start.localeCompare(b.start));
    if(!allB.length)return'';
    const planned=allB.reduce((s,b)=>s+b.duration,0);
    const free=Math.max(0,avail-planned);
    const catColors={routine:'#fbbf24',obligatory:'#60a5fa',fitness:'#4ade80',learning:'#a78bfa',leisure:'#fb923c'};
    rows+=`<div class="cal-tip-row">⏱ ${lang==='de'?'Geplant':'Planned'}: <b>${minToHM(planned)}</b></div>`;
    rows+=`<div class="cal-tip-row">✅ ${lang==='de'?'Frei':'Free'}: <b>${minToHM(free)}</b></div>`;
    rows+=`<div class="cal-tip-div"></div>`;
    allB.slice(0,5).forEach(b=>{const col=b.fromTodo?(b.color||'#94a3b8'):(catColors[b.category]||'#94a3b8');rows+=`<div class="cal-tip-row"><span style="color:${col};font-size:.65rem">●</span><span style="flex:1">${esc(b.name)}</span><span style="opacity:.6">${b.start}</span></div>`;});
    if(allB.length>5)rows+=`<div class="cal-tip-row" style="opacity:.4">+${allB.length-5}…</div>`;
  }
  if(!rows)return'';
  return`<div class="cal-tip-date">${dlbl}</div>${rows}`;
}

// ── Shared calendar widget ─────────────────────────────────
function calWidget(gridId,titleId,year,month,selected,markFn,clickFn,tab){
  const today=todayStr(),fd=(new Date(year,month,1).getDay()+6)%7,dm=new Date(year,month+1,0).getDate();
  const el=document.getElementById(titleId);if(el)el.textContent=`${t('months')[month]} ${year}`;
  let h='';
  for(let i=0;i<fd;i++)h+='<div class="cal-day"></div>';
  for(let d=1;d<=dm;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isF=ds>today,isT=ds===today,isSel=ds===selected,mark=markFn?markFn(ds):0;
    let bg='rgba(255,255,255,.04)',clr=isF?'rgba(255,255,255,.12)':'rgba(255,255,255,.55)',extra='';
    if(isSel){bg='var(--primary)';clr='var(--bg)';}
    else if(mark)bg='rgba(255,255,255,.1)';
    if(isT&&!isSel)extra='outline:2px solid var(--primary);outline-offset:1px;';
    const click=!isF&&clickFn?` onclick="${clickFn}('${ds}')"`:'';
    const tip=tab&&!isF?` onmouseenter="showCalTip(event,'${tab}','${ds}')" onmouseleave="hideCalTip()"`:' onmouseenter="hideCalTip()"';
    h+=`<div class="cal-day${!isF?' clickable':''}" style="background:${bg};color:${clr};${extra}"${click}${tip}><span class="cal-day-num">${d}</span>${mark&&!isSel?'<span class="cal-dot"></span>':''}</div>`;
  }
  document.getElementById(gridId).innerHTML=h;
}

function calculateTDEE(){
  const age=parseInt(document.getElementById('calc-age').value),height=parseFloat(document.getElementById('calc-height').value),weight=parseFloat(document.getElementById('calc-cw').value);
  if(!age||!height||!weight){toast(lang==='de'?'Bitte Alter, Größe & Gewicht eingeben!':'Please enter age, height & weight!');return;}
  const actMult=parseFloat(document.getElementById('calc-act').value)||1.55;
  const goalDelta=parseInt(document.getElementById('calc-goal').value)||0;
  const bmr=Math.round(10*weight+6.25*height-5*age+(calcGender==='male'?5:-161));
  const tdee=Math.round(bmr*actMult);
  const target=Math.max(1200,tdee+goalDelta);
  const protPerKg=calcGoalType==='fat'?2.2:calcGoalType==='muscle'?2.4:calcGoalType==='athletic'?2.0:1.8;
  const fatPct=calcGoalType==='athletic'?.20:calcGoalType==='maintain'?.30:.25;
  let protein=Math.min(Math.round(weight*protPerKg),Math.round(target*.4/4));
  let fat=Math.round(target*fatPct/9);
  let carbs=Math.round((target-protein*4-fat*9)/4);
  if(carbs<0){fat=Math.round((target-protein*4)/9*.5);carbs=Math.max(0,Math.round((target-protein*4-fat*9)/4));}
  healthData.profile={gender:calcGender,age,height,weight,actMult,goalDelta,goalType:calcGoalType,target,bmr,tdee,protein,carbs,fat};
  saveHealth();
  const total=protein+carbs+fat;
  const pp=Math.round(protein/total*100),cp=Math.round(carbs/total*100),fp=100-pp-cp;
  const primary=getCSSVar('--primary');
  const res=document.getElementById('calc-res');
  res.innerHTML=`<div class="calc-target">${target}</div><div class="calc-tsub">kcal/Tag — ${t('resTarget')}</div><div class="calc-row"><div class="citem"><div class="citem-n">${bmr.toLocaleString()}</div><div class="citem-l">${t('resBMR')}</div></div><div class="citem"><div class="citem-n">${tdee.toLocaleString()}</div><div class="citem-l">${t('resTDEE')}</div></div></div><div style="font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:8px">${t('resMacros')}</div><div style="display:flex;gap:8px;margin-bottom:10px"><div class="citem" style="flex:1;background:${primary}18;border:1px solid ${primary}35;border-radius:8px;padding:10px 6px"><div class="citem-n" style="color:${primary}">${protein}g</div><div class="citem-l">${lang==='de'?'Eiweiß':'Protein'}</div><div class="citem-l">${pp}%</div></div><div class="citem" style="flex:1;background:#fbbf2418;border:1px solid #fbbf2435;border-radius:8px;padding:10px 6px"><div class="citem-n" style="color:#fbbf24">${carbs}g</div><div class="citem-l">${t('carbs')}</div><div class="citem-l">${cp}%</div></div><div class="citem" style="flex:1;background:#f9a8d418;border:1px solid #f9a8d435;border-radius:8px;padding:10px 6px"><div class="citem-n" style="color:#f9a8d4">${fat}g</div><div class="citem-l">${t('fat')}</div><div class="citem-l">${fp}%</div></div></div><div class="macro-bar"><div style="flex:${pp};background:${primary}"></div><div style="flex:${cp};background:#fbbf24"></div><div style="flex:${fp};background:#f9a8d4"></div></div>`;
  res.style.display='block';
  renderHealthStats();
}

function calcSportKcal(date){
  const weight=(healthData.entries.filter(e=>e.weight!=null).sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0]?.weight)||70;
  const met={low:4,medium:7,high:11};
  return Math.round((data.activities||[]).filter(a=>a.date===date).reduce((s,a)=>s+(met[a.intensity]||7)*weight*(a.duration/60),0));
}

function _calcDayBurned(ds){
  const tdee=healthData.profile?.tdee||0;
  const sport=calcSportKcal(ds);
  // TDEE is the base (resting + daily activity from profile), sport is additional on top
  return tdee+sport||null;
}

function renderKcalBalance(){
  const today=todayStr();
  const entry=healthData.entries.find(e=>e.date===today);

  const tdee=healthData.profile?.tdee||null;
  const bmr=healthData.profile?.bmr||null;

  const parts=[];

  const note=parts.length?` <span style="font-size:.67rem;color:var(--muted);display:block;margin-top:2px">${parts.join(' · ')}</span>`:'';

async function btConnect(){
  if(!navigator.bluetooth){
    toast(lang==='de'?'Web Bluetooth nicht verfügbar — bitte Chrome oder Edge nutzen':'Web Bluetooth not available — use Chrome or Edge');
    return;
  }
  try{
    btDevice=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:['heart_rate','weight_scale','battery_service']
    });
    btDevice.addEventListener('gattserverdisconnected',onBtDisconnected);
    const server=await btDevice.gatt.connect();
    try{
      const hrSvc=await server.getPrimaryService('heart_rate');
      const hrChar=await hrSvc.getCharacteristic('heart_rate_measurement');
      await hrChar.startNotifications();
      hrChar.addEventListener('characteristicvaluechanged',e=>{
        const f=e.target.value.getUint8(0);
        btReadings.hr=f&1?e.target.value.getUint16(1,true):e.target.value.getUint8(1);
        renderBtPanel();
      });
    }catch(e){}
    try{
      const wSvc=await server.getPrimaryService('weight_scale');
      const wChar=await wSvc.getCharacteristic('weight_measurement');
      wChar.addEventListener('characteristicvaluechanged',e=>{
        const f=e.target.value.getUint8(0);
        const raw=e.target.value.getUint16(1,true);
        btReadings.weight=f&1?+(raw*0.01*0.453592).toFixed(1):+(raw*0.005).toFixed(1);
        renderBtPanel();
      });
      await wChar.startNotifications();
    }catch(e){}
    renderBtPanel();
    toast((btDevice.name||'Gerät')+' '+(lang==='de'?'verbunden ✓':'connected ✓'));
  }catch(e){
    btDevice=null;
    if(e.name!=='NotFoundError'&&e.name!=='AbortError')toast(lang==='de'?'Verbindung fehlgeschlagen':'Connection failed');
  }
}

function triggerImport(ext){const fi=document.getElementById('sync-file');fi.accept=ext;fi.value='';fi.click();}

function syncImportFile(input){
  const file=input.files[0];if(!file)return;

  const reader=new FileReader();

function _normDate(str){
  if(!str)return null;str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(str))return str.slice(0,10);
  const m1=str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);if(m1)return`${m1[3]}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  const m2=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(m2)return`${m2[3]}-${m2[1].padStart(2,'0')}-${m2[2].padStart(2,'0')}`;
  return null;
}

function parseAppleHealth(xml){
  try{
    const doc=new DOMParser().parseFromString(xml,'application/xml');
    if(doc.querySelector('parsererror')){toast(lang==='de'?'Ungültige XML-Datei':'Invalid XML file');return;}
    const dm={};
    doc.querySelectorAll('Record').forEach(r=>{
      const type=r.getAttribute('type'),ds=(r.getAttribute('startDate')||'').slice(0,10);
      if(!ds||ds<'2000-01-01'||ds>todayStr())return;
      if(!dm[ds])dm[ds]={};
      const v=parseFloat(r.getAttribute('value'));
      if(type==='HKQuantityTypeIdentifierBodyMass'&&!isNaN(v)){
        dm[ds].weight=r.getAttribute('unit')==='lb'?+(v*.453592).toFixed(1):+v.toFixed(1);
      }else if(type==='HKQuantityTypeIdentifierHeartRate'&&!isNaN(v)){
        if(!dm[ds]._hrS){dm[ds]._hrS=0;dm[ds]._hrN=0;}dm[ds]._hrS+=v;dm[ds]._hrN++;
      }else if(type==='HKQuantityTypeIdentifierStepCount'&&!isNaN(v)){
        dm[ds].steps=(dm[ds].steps||0)+Math.round(v);
      }else if(type==='HKQuantityTypeIdentifierActiveEnergyBurned'&&!isNaN(v)){
        dm[ds]._kcalB=(dm[ds]._kcalB||0)+Math.round(v);
      }else if(type==='HKQuantityTypeIdentifierDietaryEnergyConsumed'&&!isNaN(v)){
        dm[ds]._kcal=(dm[ds]._kcal||0)+Math.round(v);
      }else if(type==='HKCategoryTypeIdentifierSleepAnalysis'){
        const val=parseInt(r.getAttribute('value'));
        if(val===1||val===3||val===4||val===5){
          const h=(new Date(r.getAttribute('endDate'))-new Date(r.getAttribute('startDate')))/3600000;
          if(h>0&&h<24)dm[ds].sleepH=+((dm[ds].sleepH||0)+h).toFixed(1);
        }
      }
    });
    Object.values(dm).forEach(d=>{
      if(d._hrN){d.hr=Math.round(d._hrS/d._hrN);delete d._hrS;delete d._hrN;}
      if(d._kcal){d.kcal=d._kcal;delete d._kcal;}
      if(d._kcalB){d.kcalBurned=d._kcalB;delete d._kcalB;}
    });
    showSyncPreview(dm,'Apple Health');
  }catch(err){toast(lang==='de'?'Fehler beim Lesen':'Read error');console.error(err);}
}

function parseGoogleFitJSON(json){
  try{
    const data=JSON.parse(json),dm={};
    const addEntry=(ds,key,val)=>{if(ds&&val!=null&&!isNaN(val)){if(!dm[ds])dm[ds]={};dm[ds][key]=val;}};
    if(Array.isArray(data)){
      data.forEach(e=>{
        const ds=_normDate(e.date||e.Date||e.startTime||e.timestamp);
        if(!ds)return;
        if(e.weight||e.Weight)addEntry(ds,'weight',+parseFloat(e.weight||e.Weight).toFixed(1));
        if(e.steps||e.Steps)addEntry(ds,'steps',parseInt(e.steps||e.Steps));
        if(e.hr||e.heartRate||e.heart_rate)addEntry(ds,'hr',parseInt(e.hr||e.heartRate||e.heart_rate));
        if(e.kcal||e.calories||e.Calories)addEntry(ds,'kcal',parseInt(e.kcal||e.calories||e.Calories));
        if(e.sleepH||e.sleep_hours)addEntry(ds,'sleepH',parseFloat(e.sleepH||e.sleep_hours));
      });
    }
    showSyncPreview(dm,'JSON');
  }catch(err){toast(lang==='de'?'Fehler beim Lesen der JSON-Datei':'Error reading JSON file');}
}

function parseSyncCSV(csv){
  const lines=csv.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){toast(lang==='de'?'Datei leer':'File empty');return;}
  const sep=lines[0].includes(';')?';':',';
  const hdrs=lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/["']/g,''));
  const iDate=hdrs.findIndex(h=>/^(date|datum|day|tag)$/.test(h));
  if(iDate<0){toast(lang==='de'?'Keine Datumsspalte (date/datum) gefunden':'No date column (date/datum) found');return;}
  const fi=(pat)=>hdrs.findIndex(h=>pat.test(h));
  const cols={weight:fi(/^(weight|gewicht)$/),steps:fi(/^(steps|schritte)$/),hr:fi(/^(hr|heart.?rate|puls|bpm|resting.?hr)$/),
    sleepH:fi(/^(sleep.?h(ours?)?|schlaf.?h|schlafstunden?)$/),sleepScore:fi(/^(sleep.?score|schlafqualit)/),
    kcal:fi(/^(kcal|calories?|kalorien|kcal.?eat|eaten)$/),kcalBurned:fi(/^(kcal.?burn|burn|verbrannt|active.?cal|burned)$/),protein:fi(/^(protein|eiweiß|eiweiss)$/),
    carbs:fi(/^(carbs?|kohlenhydrate|kh)$/),fat:fi(/^(fat|fett)$/),notes:fi(/^(notes?|notizen?)$/)};
  const dm={};
  lines.slice(1).forEach(line=>{
    const cs=line.split(sep).map(c=>c.trim().replace(/["']/g,''));
    const ds=_normDate(cs[iDate]);if(!ds||ds>'2099-12-31'||ds<'2000-01-01')return;
    const e={};
    const pN=(k,fn=parseFloat)=>{if(cols[k]>=0&&cs[cols[k]]){const v=fn(cs[cols[k]]);if(!isNaN(v)&&v>0)e[k]=k==='weight'?+v.toFixed(1):v;}};
    pN('weight');pN('steps',parseInt);pN('hr',parseInt);pN('sleepH');pN('sleepScore',parseInt);
    pN('kcal',parseInt);pN('kcalBurned',parseInt);pN('protein',parseInt);pN('carbs',parseInt);pN('fat',parseInt);
    if(cols.notes>=0&&cs[cols.notes])e.notes=cs[cols.notes];
    if(Object.keys(e).length)dm[ds]={...dm[ds],...e};
  });
  showSyncPreview(dm,'CSV');
}

function showSyncPreview(dm,source){
  const entries=Object.entries(dm).filter(([,d])=>Object.keys(d).length).sort((a,b)=>b[0].localeCompare(a[0]));
  pendingImport=entries;
  if(!entries.length){toast(lang==='de'?'Keine Daten gefunden':'No data found');return;}
  const count=entries.length;
  const rows=entries.slice(0,5).map(([ds,d])=>{
    const vals=[];
    if(d.weight!=null)vals.push(`${d.weight} kg`);if(d.hr!=null)vals.push(`${d.hr} bpm`);
    if(d.steps!=null)vals.push(`${d.steps.toLocaleString()} ${lang==='de'?'Schr.':'steps'}`);
    if(d.sleepH!=null)vals.push(`${d.sleepH}h`);if(d.kcal!=null)vals.push(`${d.kcal} kcal`);
    return`<div class="sync-prev-row"><span class="sync-prev-date">${fmtDate(ds)}</span><span class="sync-prev-vals">${vals.join(' · ')||'—'}</span></div>`;
  }).join('');
  document.getElementById('sync-preview').innerHTML=
    `<div class="sync-prev-info">${source}: ${count} ${t('impEntries')}</div>${rows}`
    +(count>5?`<div style="font-size:.72rem;color:var(--muted);padding:4px 0">+ ${count-5} ${lang==='de'?'weitere':'more'}…</div>`:'')
    +`<div style="display:flex;gap:8px;margin-top:12px">`
    +`<button class="btn btn-primary" onclick="confirmSyncImport()" style="flex:1">${t('impImport')} (${count})</button>`
    +`<button class="btn" onclick="cancelSyncImport()" style="flex:1;border:1px solid var(--border);color:var(--muted);background:transparent;font-family:inherit">${t('impCancel')}</button>`
    +`</div>`;
}

  blocks.push({id:blockId,name,start,duration:dur,category:cat});
  blocks.sort((a,b)=>a.start.localeCompare(b.start));
  setDpBlocks(blocks);
  document.getElementById('dp-block-name').value='';
  data.todos.push({id:uid(),name,color:catColors[cat]||'#94a3b8',type:'boolean',target:1,active:true,frequency:'regular',createdDate:dpDate,linkedBlockId:blockId});
  save();
  saveDayPlan();
}
function removeDayBlock(id){
  loadDayPlan();
  const linked=data.todos.find(td=>td.linkedBlockId===id);
  if(linked){data.todos=data.todos.filter(td=>td.id!==linked.id);save();}
  setDpBlocks(getDpBlocks().filter(b=>b.id!==id));
  saveDayPlan();
}
function timeToMin(t){const[h,m]=(t||'00:00').split(':').map(Number);return h*60+m;}
function minToHM(m){const h=Math.floor(m/60),mm=m%60;return h?(mm?`${h}h ${mm}m`:`${h}h`):`${mm}m`;}

function renderDayPlan(){
  loadDayPlan();
  // Date label + today button
  const dlabel=document.getElementById('dp-date-label');
  if(dlabel){const d=new Date(dpDate+'T00:00:00');dlabel.textContent=d.toLocaleDateString(lang==='de'?'de-DE':'en-US',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
  const todayBtn=document.getElementById('dp-today-btn');
  if(todayBtn){todayBtn.textContent=t('dpToday');todayBtn.style.display=dpDate===todayStr()?'none':'';}
  const wake=timeToMin(dayPlan.wakeTime||'07:00');
  const sleep=timeToMin(dayPlan.sleepTime||'22:30');
  const available=sleep>wake?sleep-wake:1440-(wake-sleep);
  const realBlocks=getDpBlocks();
  const todoBlocks=getTodoBlocks(dpDate);
  const allBlocks=[...realBlocks,...todoBlocks].sort((a,b)=>a.start.localeCompare(b.start));
  const planned=allBlocks.reduce((s,b)=>s+b.duration,0);
  const free=Math.max(0,available-planned);
  const ea=document.getElementById('dp-stat-avail');if(ea)ea.textContent=minToHM(available);
  const ep=document.getElementById('dp-stat-planned');if(ep)ep.textContent=minToHM(planned);
  const ef=document.getElementById('dp-stat-free');if(ef)ef.textContent=minToHM(free);
  const catColors={routine:'#fbbf24',obligatory:'#60a5fa',fitness:'#4ade80',learning:'#a78bfa',leisure:'#fb923c'};
  // Timeline
  const tl=document.getElementById('dp-timeline');
  if(tl){
    const span=available||1;let html='';
    // Edge markers: always show wake (left) and sleep (right)
    const wakeLabel=dayPlan.wakeTime||'07:00';
    const sleepLabel=dayPlan.sleepTime||'22:30';
    html+=`<div class="timeline-tick-line" style="left:0%;top:6px"></div>`;
    html+=`<div class="timeline-tick" style="left:0%;transform:none">${wakeLabel}</div>`;
    html+=`<div class="timeline-tick-line" style="left:100%;top:6px"></div>`;
    html+=`<div class="timeline-tick" style="left:100%;transform:translateX(-100%)">${sleepLabel}</div>`;
    // Intermediate hour ticks (skip if too close to edges)
    const tickStep=span<=180?30:span<=360?60:120;
    const minDist=span*0.08;
    for(let off=tickStep;off<span;off+=tickStep){
      if(off<minDist||off>span-minDist)continue;
      const pct=(off/span*100).toFixed(1);
      const absMin=(wake+off)%1440;
      const lbl=`${String(Math.floor(absMin/60)).padStart(2,'0')}:${String(absMin%60).padStart(2,'0')}`;
      html+=`<div class="timeline-tick-line" style="left:${pct}%;top:6px"></div>`;
      html+=`<div class="timeline-tick" style="left:${pct}%">${lbl}</div>`;
    }
    // Blocks
    allBlocks.forEach(b=>{
      let bMin=timeToMin(b.start)-wake;if(bMin<0)bMin+=1440;
      const left=Math.max(0,Math.min(bMin/span*100,100));
      const width=Math.min(b.duration/span*100,100-left);
      if(width<0.2)return;
      const col=b.fromTodo?(b.color||'#94a3b8'):(catColors[b.category]||'#94a3b8');
      const endRawMin=timeToMin(b.start)+b.duration;
      const endHStr=`${String(Math.floor(endRawMin/60)%24).padStart(2,'0')}:${String(endRawMin%60).padStart(2,'0')}`;
      const safeName=b.name.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      html+=`<div class="timeline-block" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${col}22;border:1px solid ${col};color:${col}" data-name="${safeName}" data-color="${col}" data-tr="${b.start}–${endHStr}" data-dur="${minToHM(b.duration)}" onmouseenter="showTlTip(event,this)" onmousemove="moveTlTip(event)" onmouseleave="hideTlTip()">${b.name}</div>`;
    });
    // Current time needle
    const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
    let nowOff=nowMin-wake;if(nowOff<0)nowOff+=1440;
    if(nowOff>=0&&nowOff<=span){
      const pct=(nowOff/span*100).toFixed(1);
      const nowLbl=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      html+=`<div class="timeline-now" style="left:${pct}%"><span class="timeline-now-lbl">${nowLbl}</span></div>`;
    }
    tl.innerHTML=html;
  }
  // Block list
  const list=document.getElementById('dp-blocks-list');
  if(list){
    if(!allBlocks.length){list.innerHTML=`<div class="empty"><div class="ico">📅</div><div>${lang==='de'?'Noch keine Blöcke':'No blocks yet'}</div></div>`;}
    else{
      list.innerHTML=allBlocks.map(b=>{
        const endRaw=timeToMin(b.start)+b.duration;
        const endH=`${String(Math.floor(endRaw/60)%24).padStart(2,'0')}:${String(endRaw%60).padStart(2,'0')}`;
        const col=b.fromTodo?(b.color||'#94a3b8'):(catColors[b.category]||'#94a3b8');
        const action=b.fromTodo?`<span class="dp-todo-badge">${lang==='de'?'📅 Eingeplant':'📅 Scheduled'}</span>`:`<button class="btn-icon" onclick="removeDayBlock('${b.id}')">✕</button>`;
        return`<div class="tday-block-item"><div class="tday-block-dot" style="background:${col}"></div><div class="tday-block-name">${b.name}</div><div class="tday-block-time">${b.start}–${endH} · ${minToHM(b.duration)}</div>${action}</div>`;
      }).join('');
    }
  }
  // Sleep tip
  const tip=document.getElementById('dp-sleep-tip');
  if(tip){
    const wakeStr=dayPlan.wakeTime||'07:00';
    const[wh,wm]=wakeStr.split(':').map(Number);
    const recs=[{h:9,label:'9h'},{h:8,label:'8h'},{h:7.5,label:'7.5h'}].map(o=>{
      const st=((wh*60+wm-o.h*60)+1440)%1440;
      return`${String(Math.floor(st/60)).padStart(2,'0')}:${String(st%60).padStart(2,'0')} (${o.label})`;
    });
    tip.textContent=`${t('sleepTipPre')} ${wakeStr} ${t('sleepTipAt')} ${recs.join('  ·  ')}`;
  }
  renderDpCal();
  applyAllCollapses();
}
function renderDpCal(){
  loadDayPlan();
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const hdr=document.getElementById('h-dp-month');
  if(hdr)hdr.textContent=`📅 ${t('months')[m]} ${y}`;
  const calHdr=document.getElementById('dp-cal-hdr');
  if(calHdr)calHdr.innerHTML=t('calD').map(d=>`<div class="cal-header">${d}</div>`).join('');
  const days=new Date(y,m+1,0).getDate(),first=(new Date(y,m,1).getDay()+6)%7,today=todayStr();
  let html='';
  for(let i=0;i<first;i++)html+='<div class="cal-day"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSel=ds===dpDate,isToday=ds===today;
    const wake=timeToMin(dayPlan.wakeTime||'07:00'),sleep=timeToMin(dayPlan.sleepTime||'22:30');
    const avail=sleep>wake?sleep-wake:1440-(wake-sleep);
    const realB=(dayPlan.byDate&&dayPlan.byDate[ds])||[];
    const todoB=getTodoBlocks(ds);
    const planned=[...realB,...todoB].reduce((s,b)=>s+b.duration,0);
    let bg='rgba(255,255,255,.04)',fg='rgba(255,255,255,.3)';
    if(planned>0){
      const freeRatio=avail>0?Math.max(0,Math.min((avail-planned)/avail,1)):0;
      const r=Math.round(220*(1-freeRatio)+20),g=Math.round(200*freeRatio+20),b=30;
      const alpha=0.3+0.25*(1-freeRatio);
      bg=`rgba(${r},${g},${b},${alpha.toFixed(2)})`;
      fg=freeRatio>=0.5?'rgba(80,220,100,.95)':'rgba(255,100,60,.95)';
    }
    let extra='';
    if(isToday)extra+='outline:2px solid var(--primary);outline-offset:1px;';
    if(isSel)extra+='box-shadow:inset 0 0 0 2.5px rgba(255,255,255,.7);';
    html+=`<div class="cal-day clickable" style="background:${bg};color:${fg};${extra}" onclick="selectDpDay('${ds}')" onmouseenter="showCalTip(event,'dayplan','${ds}')" onmouseleave="hideCalTip()"><span class="cal-day-num">${d}</span>${planned>0?`<span class="cal-day-pct">${minToHM(planned)}</span>`:''}</div>`;
  }
  const el=document.getElementById('dp-month-cal');
  if(el)el.innerHTML=html;
}

// ── Daily Score ───────────────────────────────────────────────
const SCORE_KEY='daily-tracker-scores';
let scoreData={byDate:{}};
let scoreDate=todayStr();
function loadScores(){try{scoreData=JSON.parse(localStorage.getItem(SCORE_KEY))||{byDate:{}};}catch{scoreData={byDate:{}};}}
function saveScores(){localStorage.setItem(SCORE_KEY,JSON.stringify(scoreData));}
function getScoreInput(ds){return(scoreData.byDate&&scoreData.byDate[ds])||{};}
function setScoreInput(ds,key,val){if(!scoreData.byDate)scoreData.byDate={};if(!scoreData.byDate[ds])scoreData.byDate[ds]={};scoreData.byDate[ds][key]=val;}

function calcScore(ds){
  loadDayPlan();loadScores();
  const inp=getScoreInput(ds);
  const he=(healthData.entries||[]).filter(e=>e.date===ds).slice(-1)[0]||{};
  const acts=(data.activities||[]).filter(a=>a.date===ds);
  const prof=healthData.profile||{};
  const cats=[];
  // 1. Todos (25)
  const todoPts=Math.round(pct(ds)/100*25);
  cats.push({key:'todos',label:t('scoreTodos'),points:todoPts,max:25,available:true});
  // 2. Wake time (15)
  const plannedWake=dayPlan.wakeTime||'07:00';
  const actualWake=inp.actualWakeTime||null;
  let wakePts=0,wakeAvail=!!actualWake;
  if(actualWake){
    const diff=timeToMin(actualWake)-timeToMin(plannedWake);
    if(diff<=0)wakePts=15;else if(diff<=10)wakePts=15;else if(diff<=20)wakePts=12;else if(diff<=30)wakePts=8;else if(diff<=60)wakePts=4;else wakePts=0;
  }
  cats.push({key:'wake',label:t('scoreWake'),points:wakePts,max:15,available:wakeAvail});
  // 3. Sleep duration (15) — score input takes priority over health entry
  const sleepH=inp.sleepH!=null?parseFloat(inp.sleepH):(he.sleepH!=null?he.sleepH:null);
  let sleepPts=0,sleepAvail=sleepH!=null;
  if(sleepAvail){if(sleepH>=7.5&&sleepH<=9)sleepPts=15;else if((sleepH>=7&&sleepH<7.5)||(sleepH>9&&sleepH<=9.5))sleepPts=11;else if(sleepH>=6)sleepPts=6;else sleepPts=0;}
  cats.push({key:'sleep',label:t('scoreSleep'),points:sleepPts,max:15,available:sleepAvail});
  // 4. Sport (15)
  let sportPts=0;
  if(acts.length){const best=acts.reduce((m,a)=>{const p={low:8,medium:12,high:15}[a.intensity]||8;return p>m?p:m;},0);sportPts=best;}
  cats.push({key:'sport',label:t('scoreSport'),points:sportPts,max:15,available:true});
  // 5. Nutrition (15)
  let foodPts=0;
  if(he.kcal!=null){
    foodPts=3;
    if(he.protein!=null&&he.carbs!=null&&he.fat!=null){
      foodPts=7;
      if(prof.protein&&prof.carbs&&prof.fat){
        const ok15=(v,tg)=>Math.abs(v-tg)/tg<=0.15;
        const ok10=(v,tg)=>Math.abs(v-tg)/tg<=0.10;
        if(ok15(he.protein,prof.protein)&&ok15(he.carbs,prof.carbs)&&ok15(he.fat,prof.fat)){
          foodPts=11;
          const kcalTarget=prof.target||null;
          if(kcalTarget&&ok10(he.kcal,kcalTarget)&&ok10(he.protein,prof.protein)&&ok10(he.carbs,prof.carbs)&&ok10(he.fat,prof.fat))
            foodPts=15;
        }
      }
    }
  }
  cats.push({key:'food',label:t('scoreFood'),points:foodPts,max:15,available:true});
  // 6. Sleep quality (10) — score input takes priority
  const sq=inp.sleepScore!=null?parseFloat(inp.sleepScore):(he.sleepScore!=null?he.sleepScore:null);
  cats.push({key:'sleepq',label:t('scoreSleepQ'),points:sq!=null?Math.round(sq/10*10):0,max:10,available:sq!=null});
  // 7. Recovery (5) — score input takes priority
  const rec=inp.recovery!=null?parseFloat(inp.recovery):(he.recovery!=null?he.recovery:null);
  cats.push({key:'recov',label:t('scoreRecov'),points:rec!=null?Math.round(rec/10*5):0,max:5,available:rec!=null});
  const total=cats.reduce((s,c)=>s+c.points,0);
  const missingInputs=cats.filter(c=>!c.available&&c.inputKey);
  return{total,cats,missingInputs};
}

        :`<span class="score-missing-badge">⚠ ${t('scoreMissingBadge')}</span>`;
      return`<div class="score-cat-row"><span class="score-cat-label">${c.label}</span>${right}</div>`;
    }).join('');
  }
  // Fill input fields with stored values (score inputs first, health entry as fallback)
