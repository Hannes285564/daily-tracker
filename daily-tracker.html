  const he=(healthData.entries||[]).filter(e=>e.date===scoreDate).slice(-1)[0]||{};
  const wakeEl=document.getElementById('score-input-wake');

  const sleepqEl=document.getElementById('score-input-sleepq');
  if(sleepqEl)sleepqEl.value=inp.sleepScore??he.sleepScore??'';
  const recovEl=document.getElementById('score-input-recov');
  if(recovEl)recovEl.value=inp.recovery??he.recovery??'';
}

// ── Focus Mode (Web Audio API) ────────────────────────────────
let focusAudioCtx=null,focusGainNode=null,focusNoiseSources=[],focusCurrentSound='off';

function initAudioCtx(){
  if(!focusAudioCtx)focusAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(!focusGainNode){
    focusGainNode=focusAudioCtx.createGain();
    focusGainNode.gain.value=parseFloat(document.getElementById('focus-vol')?.value||0.5);
    focusGainNode.connect(focusAudioCtx.destination);
  }
}
function stopFocusAudio(){focusNoiseSources.forEach(s=>{try{s.stop();}catch(e){}});focusNoiseSources=[];}

function buildNoiseBuffer(ctx,type){
  const sr=ctx.sampleRate,len=sr*4,buf=ctx.createBuffer(1,len,sr),d=buf.getChannelData(0);
  if(type==='white'||type==='rain'){for(let i=0;i<len;i++)d[i]=Math.random()*2-1;}
  else if(type==='brown'){
    let last=0;
    for(let i=0;i<len;i++){last=(last+0.02*(Math.random()*2-1))/1.02;d[i]=last;}
    const max=d.reduce((m,v)=>Math.max(m,Math.abs(v)),1e-6);
    for(let i=0;i<len;i++)d[i]=Math.max(-1,Math.min(1,d[i]/(max*0.9)));
  }
  return buf;
}

function setFocusSound(type){
  focusCurrentSound=type;
  ['off','white','brown','rain'].forEach(s=>{document.getElementById('snd-'+s)?.classList.toggle('active',s===type);});
  document.querySelectorAll('.fov-snd-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===type));
  stopFocusAudio();
  if(type==='off'||!focusAudioCtx)return;
  if(type==='rain'){
    const buf1=buildNoiseBuffer(focusAudioCtx,'rain');
    const src1=focusAudioCtx.createBufferSource();src1.buffer=buf1;src1.loop=true;
    const lp=focusAudioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=350;lp.Q.value=0.5;
    const g1=focusAudioCtx.createGain();g1.gain.value=0.65;
    src1.connect(lp);lp.connect(g1);g1.connect(focusGainNode);src1.start();focusNoiseSources.push(src1);
    const buf2=buildNoiseBuffer(focusAudioCtx,'rain');
    const src2=focusAudioCtx.createBufferSource();src2.buffer=buf2;src2.loop=true;
    const bp=focusAudioCtx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2200;bp.Q.value=1.5;
    const g2=focusAudioCtx.createGain();g2.gain.value=0.25;
    src2.connect(bp);bp.connect(g2);g2.connect(focusGainNode);src2.start();focusNoiseSources.push(src2);
  }else{
    const buf=buildNoiseBuffer(focusAudioCtx,type);
    const src=focusAudioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    src.connect(focusGainNode);src.start();focusNoiseSources.push(src);
  }
}

function setFocusVolume(v){
  const fv=document.getElementById('focus-vol');if(fv)fv.value=v;
  const fov=document.getElementById('fov-vol');if(fov)fov.value=v;
  if(focusGainNode)focusGainNode.gain.value=parseFloat(v);
}

let focusState={active:false,phase:'work',round:1,totalRounds:4,workSec:1500,breakSec:300,remaining:0,iv:null};

function startFocus(){
  initAudioCtx();
  if(focusAudioCtx.state==='suspended')focusAudioCtx.resume();
  clearInterval(focusState.iv);
  focusState.workSec=(parseInt(document.getElementById('focus-work').value)||25)*60;
  focusState.breakSec=(parseInt(document.getElementById('focus-break').value)||5)*60;
  focusState.totalRounds=parseInt(document.getElementById('focus-rounds').value)||4;
  focusState.round=1;focusState.phase='work';
  focusState.remaining=focusState.workSec;focusState.active=true;
  const row=document.getElementById('fov-sound-row');
  if(row)row.innerHTML=['off','white','brown','rain'].map(s=>{
    const label=t('snd'+s.charAt(0).toUpperCase()+s.slice(1));
    return`<button class="focus-snd-btn fov-snd-btn${s===focusCurrentSound?' active':''}" data-s="${s}" onclick="setFocusSound('${s}')">${label}</button>`;
  }).join('');
  if(focusCurrentSound!=='off')setFocusSound(focusCurrentSound);
  document.getElementById('focus-overlay').classList.add('open');
  updateFocusDisplay();
  focusState.iv=setInterval(tickFocus,1000);
}

function tickFocus(){
  focusState.remaining--;
  if(focusState.remaining<=0){
    if(focusState.phase==='work'){
      if(focusState.round>=focusState.totalRounds){stopFocus();return;}
      focusState.phase='break';focusState.remaining=focusState.breakSec;
    }else{
      focusState.round++;focusState.phase='work';focusState.remaining=focusState.workSec;
    }
  }
  updateFocusDisplay();
}

function updateFocusDisplay(){
  const m=Math.floor(focusState.remaining/60),s=focusState.remaining%60;
  const td=document.getElementById('fov-timer');if(td)td.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const ph=document.getElementById('fov-phase');if(ph)ph.textContent=t(focusState.phase==='work'?'focusWork':'focusBreak').toUpperCase();
  const rd=document.getElementById('fov-round');if(rd)rd.textContent=`${t('focusRound')} ${focusState.round} ${t('focusOf')} ${focusState.totalRounds}`;
}

function stopFocus(){
  clearInterval(focusState.iv);focusState.active=false;
  stopFocusAudio();
  document.getElementById('focus-overlay').classList.remove('open');
}
function showTlTip(e,el){
  const tip=document.getElementById('dp-tl-tip');if(!tip)return;
  document.getElementById('dp-tl-tip-name').textContent=el.dataset.name;
  document.getElementById('dp-tl-tip-name').style.color=el.dataset.color||'var(--text)';
  document.getElementById('dp-tl-tip-time').textContent=el.dataset.tr+' · '+el.dataset.dur;
  tip.style.display='block';
  tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-58)+'px';
}
function moveTlTip(e){const tip=document.getElementById('dp-tl-tip');if(tip&&tip.style.display!=='none'){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-58)+'px';}}
function hideTlTip(){const tip=document.getElementById('dp-tl-tip');if(tip)tip.style.display='none';}
</script>

<script>
// ── Supabase Cloud-Sync (Realtime) ────────────────────────────
// Einmalig im Supabase SQL-Editor ausführen:
// CREATE TABLE IF NOT EXISTS public.app_state (
//   app_key   TEXT PRIMARY KEY,
//   state     JSONB NOT NULL DEFAULT '{}',
//   updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
// );
// ALTER TABLE public.app_state ENABLE ROW LEVEL SECURITY;
// CREATE POLICY "anon_all" ON public.app_state
//   FOR ALL TO anon USING (true) WITH CHECK (true);
// ALTER PUBLICATION supabase_realtime ADD TABLE public.app_state;
(function(){
  'use strict';
  if(!window.supabase){console.warn('[Sync] Supabase nicht geladen');return;}

  const SUPABASE_URL='https://ooifnnbefehrpfftqbiq.supabase.co';
  const SUPABASE_KEY='sb_publishable_bdCpzjkxvx0Rep-oHUWdzw_zgcXjGLU';
  const APP_KEY='daily-tracker';
  const SYNC_KEYS=[DATA_KEY,HEALTH_KEY,PLAN_KEY,DAYPLAN_KEY,SCORE_KEY];

  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  // Originale localStorage-Methoden sichern (vor dem Patching)
  const _set=localStorage.setItem.bind(localStorage);
  const _del=localStorage.removeItem.bind(localStorage);

  // ── State lesen / schreiben ───────────────────────────────
  function readLocal(){
    const out={};
    for(const k of SYNC_KEYS){
      const v=localStorage.getItem(k);
      if(v)try{out[k]=JSON.parse(v);}catch{}
    }
    return out;
  }

  function applyRemote(state){
    // Schreiben über _set um Patch-Loop zu vermeiden
    for(const k of SYNC_KEYS){
      if(state[k]!==undefined)_set(k,JSON.stringify(state[k]));
    }
    // In-Memory-Globals aktualisieren
    const f=load();
    data.todos=f.todos;data.completions=f.completions;data.activities=f.activities;
    const fh=loadHealth();
    healthData.profile=fh.profile;healthData.entries=fh.entries;
    const fp=loadPlan();
    planData.plans=fp.plans;planData.activePlanId=fp.activePlanId;
    loadDayPlan();   // setzt dayPlan global neu
    loadScores();    // setzt scoreData global neu
    // Aktiven Tab neu rendern
    const act=document.querySelector('.tab-content.active');
    if(act?.id==='tab-todos')renderTodos();
    else if(act?.id==='tab-sport')renderSport();
    else if(act?.id==='tab-health')renderHealth();
    else if(act?.id==='tab-plan')renderPlan();
    else if(act?.id==='tab-score')renderScore();
    else if(act?.id==='tab-day')renderDayPlan();
    setDot('ok');
  }

  // ── Input-Guard: keine Remote-Änderung während Nutzereingabe ─
  let pendingRemote=null;
  function isEditing(){
    const el=document.activeElement;
    return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'||el.isContentEditable);
  }
  function scheduleApply(state){
    if(isEditing()){pendingRemote=state;return;}
    applyRemote(state);pendingRemote=null;
  }
  document.addEventListener('focusout',()=>{
    if(pendingRemote){const s=pendingRemote;pendingRemote=null;applyRemote(s);}
  });

  // ── Push ──────────────────────────────────────────────────
  let lastSyncedJson=null;
  let pushTimer=null;

  async function push(keepalive=false){
    clearTimeout(pushTimer);
    const state=readLocal();
    const json=JSON.stringify(state);
    if(json===lastSyncedJson)return;   // nichts Neues
    const body=JSON.stringify({app_key:APP_KEY,state,updated_at:new Date().toISOString()});
    if(keepalive){
      // fetch mit keepalive für Tab-Close — Supabase-SDK unterstützt keepalive nicht
      try{
        await fetch(`${SUPABASE_URL}/rest/v1/app_state`,{
          method:'POST',keepalive:true,
          headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
            'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
          body
        });
        lastSyncedJson=json;
      }catch(e){console.warn('[Sync] keepalive-Push fehlgeschlagen:',e.message);}
      return;
    }
    try{
      const{error}=await sb.from('app_state')
        .upsert({app_key:APP_KEY,state,updated_at:new Date().toISOString()},{onConflict:'app_key'});
      if(error)throw error;
      lastSyncedJson=json;
      setDot('ok');
    }catch(e){setDot('err');console.warn('[Sync] Push fehlgeschlagen:',e.message);}
  }

  function queuePush(){clearTimeout(pushTimer);pushTimer=setTimeout(()=>push(),250);}

  // ── localStorage monkey-patchen ───────────────────────────
  localStorage.setItem=function(key,value){
    try{_set(key,value);}catch(e){throw e;}
    if(SYNC_KEYS.includes(key))queuePush();
  };
  localStorage.removeItem=function(key){
    try{_del(key);}catch(e){throw e;}
    if(SYNC_KEYS.includes(key))queuePush();
  };

  // ── Dot-Indikator ─────────────────────────────────────────
  function setDot(state){
    const topDot=document.getElementById('cloud-sync-dot');
    const cardDot=document.getElementById('sync-card-dot');
    const cardTxt=document.getElementById('sync-card-txt');
    if(state==='ok'){
      if(topDot){topDot.textContent='☁';topDot.style.opacity='1';topDot.title='Synced ✓';setTimeout(()=>topDot.style.opacity='.45',2500);}
      if(cardDot){cardDot.style.background='var(--primary)';cardDot.style.opacity='1';setTimeout(()=>cardDot.style.opacity='.4',2500);}
      if(cardTxt)cardTxt.textContent='☁️ Cloud-Sync aktiv — Handy & PC synchronisieren automatisch';
    }else if(state==='err'){
      if(topDot){topDot.textContent='⚠';topDot.style.opacity='1';topDot.title='Sync-Fehler — SQL-Tabelle prüfen';}
      if(cardDot){cardDot.style.background='#f87171';cardDot.style.opacity='1';}
      if(cardTxt)cardTxt.textContent='⚠️ Sync-Fehler — Supabase-Tabelle app_state prüfen';
    }
  }

  // ── Init: Pull + Realtime-Abo ─────────────────────────────
  async function init(){
    try{
      const{data:row,error}=await sb.from('app_state')
        .select('state').eq('app_key',APP_KEY).maybeSingle();
      if(error)throw error;

      if(row?.state&&Object.keys(row.state).length>0){
        // Remote hat Daten → anwenden wenn verschieden
        const remoteJson=JSON.stringify(row.state);
        if(remoteJson!==JSON.stringify(readLocal())){
          lastSyncedJson=remoteJson;
          applyRemote(row.state);
        }else{
          lastSyncedJson=remoteJson;
          setDot('ok');
        }
      }else{
        // Erste Nutzung: lokale Daten hochladen damit nichts verloren geht
        const local=readLocal();
        if(Object.keys(local).length>0){
          lastSyncedJson=JSON.stringify(local);
          await sb.from('app_state')
            .upsert({app_key:APP_KEY,state:local,updated_at:new Date().toISOString()},{onConflict:'app_key'});
          setDot('ok');
        }
      }
    }catch(e){setDot('err');console.warn('[Sync] Init fehlgeschlagen:',e.message);}

    // Realtime-Abo — Änderungen anderer Geräte innerhalb ~1s empfangen
    sb.channel('dt-sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'app_state',
        filter:'app_key=eq.'+APP_KEY},payload=>{
        const newState=payload.new?.state;
        if(!newState)return;
        const incoming=JSON.stringify(newState);
        if(incoming===lastSyncedJson)return;  // eigenes Echo ignorieren
        lastSyncedJson=incoming;
        scheduleApply(newState);
      })
      .subscribe();
  }

  // ── Beim Schließen sofort flushen ─────────────────────────
  const flush=()=>push(true);
  window.addEventListener('pagehide',flush);
  window.addEventListener('beforeunload',flush);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')flush();});

  init();
})();
</script>

<script>
Overseer.init({page:'tracker', mount:document.getElementById('ovs-card-mount')});
Overseer.registerActions({
  // Aktivität loggen — direktes push (kein einfaches Formular-Submit verfügbar)
  log_activity(p){
    const sport=p.sport||'Training';
    data.activities.push({
      id:uid(),
      type:sport,
      emoji:_ovsEmoji(sport),
      date:p.date||todayStr(),
      duration:p.duration_min||30,
      intensity:p.intensity||'medium',
      notes:p.notes||'',
      exercises:p.exercises||[],
      calories:calcActivityKcal(p.intensity||'medium',p.duration_min||30)
    });
    save();
    renderSport();
    toast(sport+(lang==='de'?' gespeichert ✓':' saved ✓'));
  },
  // Todo erstellen — Formular befüllen + echte addTodo() aufrufen
  add_todo(p){
    document.getElementById('new-todo-name').value=p.name||'';
    document.getElementById('new-todo-color').value=p.color||'#818cf8';
    setTodoType(p.type||'boolean');
    if((p.type||'boolean')==='count')
      document.getElementById('new-todo-target').value=p.target||10;
    setTodoFreq(p.frequency||'regular');
    const timeEl=document.getElementById('new-todo-time');
    const durEl=document.getElementById('new-todo-dur');
    if(p.start_time&&timeEl)timeEl.value=p.start_time;
    if(p.duration_min&&durEl)durEl.value=p.duration_min;
    const prevView=viewDate;
    if(!p.date)viewDate=todayStr();
    addTodo();
    viewDate=prevView;
  },
  // Todo als erledigt markieren — echte toggleBool() aufrufen
  complete_todo(p){
    const q=(p.name_contains||'').toLowerCase();
    const todo=data.todos.find(t=>t.active!==false&&t.name.toLowerCase().includes(q));
    if(!todo)return;
    const prevView=viewDate;
    viewDate=p.date||todayStr();
    if(todo.type==='boolean'){
      if(!getVal(viewDate,todo.id))toggleBool(todo.id);
    } else {
      sliderChange(todo.id,p.amount??todo.target);
      save();
    }
    viewDate=prevView;
    renderTodayPanel();
  },
  // Health-Eintrag — bestehenden Eintrag mergen oder neu anlegen
  log_health(p){
    const date=p.date||todayStr();
    // Wenn für dieses Datum schon ein Eintrag existiert, edit mode aktivieren (preserviert vorhandene Felder)
    const existing=[...healthData.entries].filter(e=>e.date===date).sort((a,b)=>b.id.localeCompare(a.id))[0];
    if(existing)editHealthEntry(existing.id);
    // Jetzt neue Werte oben drauf schreiben
    const set=(id,v)=>{if(v!=null)document.getElementById(id).value=v;};
    document.getElementById('h-date').value=date;
    set('h-weight',  p.weight_kg??p.weight);
    set('h-hr',      p.hr);
    set('h-sleeph',  p.sleep_h);
    set('h-sleepq',  p.sleep_quality??p.sleep_score);
    set('h-recov',   p.recovery);
    set('h-kcal',    p.kcal);
    set('h-kcalb',   p.kcal_burned);
    set('h-steps',   p.steps);
    set('h-protein', p.protein);
    set('h-carbs',   p.carbs);
    set('h-fat',     p.fat);
    if(p.notes)document.getElementById('h-notes').value=p.notes;
    addHealthEntry(); // ruft updateHealthEntry() auf wenn editHealthId gesetzt, sonst neuer Eintrag
  },
  // Score-Tab-Inputs — Formular befüllen + echte saveScoreInputs() aufrufen
  log_score(p){
    const set=(id,v)=>{if(v!=null)document.getElementById(id).value=v;};
    set('score-input-wake',   p.wake_time??p.actualWakeTime);
    set('score-input-sleep',  p.sleep_h);
    set('score-input-sleepq', p.sleep_quality??p.sleep_score);
    set('score-input-recov',  p.recovery);
    saveScoreInputs();
  },
  // Tagesplan-Block — direktes push
  add_day_block(p){
    const date=p.date||todayStr();
    if(!dayPlan.byDate)dayPlan.byDate={};
    if(!dayPlan.byDate[date])dayPlan.byDate[date]=[];
    dayPlan.byDate[date].push({
      id:uid(),name:p.name||'Block',start:p.start||'09:00',
      duration:p.duration_min||60,category:p.category||'routine',notes:p.notes||''
    });
    saveDayPlan();
    if(document.getElementById('tab-day').classList.contains('active'))renderDayPlan();
  },
  // Plan-Session — direktes Schreiben
  set_plan_session(p){
    const plan=getActivePlan();if(!plan?.weeks)return;
    const start=new Date(plan.startDate+'T00:00:00');
    const monday=new Date(start);monday.setDate(start.getDate()-(start.getDay()+6)%7);
    const d=new Date((p.date||todayStr())+'T00:00:00');
    const diffDays=Math.floor((d-monday)/86400000);
    if(diffDays<0)return;
    const weekIdx=Math.floor(diffDays/7),dayIdx=diffDays%7;
    if(weekIdx>=plan.weeks.length)return;
    if(!plan.weeks[weekIdx].days)plan.weeks[weekIdx].days=Array(7).fill(null);
    plan.weeks[weekIdx].days[dayIdx]={
      title:p.title||'Training',description:p.description||'',
      duration:p.duration_min||60,intensity:p.intensity||'medium',details:p.details||''
    };
    savePlan();
    if(document.getElementById('tab-plan').classList.contains('active'))renderPlan();
  },
  answer_only(){}
});
</script>
